<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Chess - Desktop Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); 
            min-height: 100vh;
            overflow: hidden;
        }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        
        .desktop-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 2px solid white;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        .big-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 650px;
            aspect-ratio: 1 / 1;
            border: 12px solid #393b3d;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 15px 0 #d1d5db;
            background: white;
        }
        .sq { display: flex; justify-content: center; align-items: center; font-size: 4rem; transition: all 0.2s; cursor: pointer; }
        .sq-w { background-color: #ffffff; }
        .sq-b { background-color: #3b82f6; }
        .sq:hover { transform: scale(1.05); z-index: 10; filter: brightness(1.1); }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            border-radius: 32px; 
            border: 2px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 8px 0 #e2e8f0;
        }

        .timer-neon {
            background: #000;
            border: 4px solid #393b3d;
            box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.3), 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-attack {
            background: linear-gradient(180deg, #ff6b6b 0%, #ff4747 100%);
            box-shadow: 0 10px 0 #b91c1c, 0 20px 40px rgba(239, 68, 68, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-attack:hover { transform: scale(1.05); }
        .btn-attack:active { transform: translateY(8px); box-shadow: 0 2px 0 #b91c1c; }
    </style>
</head>
<body class="flex">

    <aside class="w-72 desktop-sidebar h-screen sticky top-0 flex flex-col p-8 z-50">
        <div class="mb-12 text-center">
            <div class="bg-[#00b06f] text-white roblox-font italic uppercase text-2xl px-4 py-2 rounded-xl shadow-lg border-t-2 border-white/30 inline-block transform -rotate-2">
                RO-CHESS
            </div>
        </div>
        <nav class="space-y-4 flex-1">
            <a href="Dashboard.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">🏠</span> Дом
            </a>
            <a href="wbots.html" class="flex items-center gap-4 p-4 bg-red-50 rounded-2xl text-red-600 font-black uppercase text-xs tracking-widest border-b-4 border-red-100">
                <span class="text-2xl">⚔️</span> Баттл
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-10 flex flex-col items-center">
        
        <div class="w-full max-w-6xl flex justify-between items-center mb-10 px-6">
            <div class="flex items-center gap-6">
                <div class="bg-[#393b3d] text-white px-8 py-4 rounded-[2rem] flex items-center gap-4 shadow-2xl border-t-2 border-white/10">
                    <span class="text-4xl animate-bounce">🤖</span>
                    <div class="text-left">
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Соперник</p>
                        <p class="font-black text-xl roblox-font italic uppercase">CPU Boss: Мастер 🔥</p>
                    </div>
                </div>
            </div>

            <div class="timer-neon text-emerald-400 px-10 py-4 rounded-[2rem] roblox-font italic text-4xl tracking-tighter border-2 border-white/5">
                05:00
            </div>
        </div>

        <div class="w-full max-w-7xl grid grid-cols-12 gap-12 items-center">
            
            <div class="col-span-3 space-y-6">
                <div class="glass-panel p-8 text-center">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 italic">Твоя Команда</p>
                    <div class="flex justify-center gap-6">
                        <button class="w-20 h-20 rounded-[1.5rem] border-4 border-blue-500 bg-blue-50 flex items-center justify-center text-4xl shadow-inner ring-4 ring-blue-100">⚪</button>
                        <button class="w-20 h-20 rounded-[1.5rem] border-4 border-transparent bg-slate-100 flex items-center justify-center text-4xl opacity-30 cursor-not-allowed">⚫</button>
                    </div>
                </div>

                <div class="glass-panel p-8">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 italic">Лог Сражения</p>
                    <div class="space-y-3">
                        <div class="flex justify-between font-black text-slate-600 text-sm bg-slate-50 p-3 rounded-xl border border-white">
                            <span>1. e4</span><span>e5</span>
                        </div>
                        <div class="flex justify-between font-black text-slate-600 text-sm bg-slate-50 p-3 rounded-xl border border-white">
                            <span>2. Кf3</span><span>Кc6</span>
                        </div>
                        <div class="flex justify-between font-black text-indigo-600 text-sm bg-indigo-50 p-3 rounded-xl border-2 border-white shadow-sm">
                            <span>3. Сc4!</span><span class="animate-pulse">...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-6 flex justify-center">
                <div class="big-board" id="gameBoard">
                    <script>
                        const board = document.getElementById('gameBoard');
                        for (let i = 0; i < 64; i++) {
                            const row = Math.floor(i / 8);
                            const col = i % 8;
                            const div = document.createElement('div');
                            div.className = `sq ${(row + col) % 2 === 0 ? 'sq-w' : 'sq-b'}`;
                            if (i === 60) div.innerHTML = "♔";
                            if (i === 4) div.innerHTML = "♚";
                            board.appendChild(div);
                        }
                    </script>
                </div>
            </div>

            <div class="col-span-3 space-y-6 text-center">
                <div class="glass-panel p-8">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Сложность Бота</p>
                    <div class="text-3xl mb-4">🔥</div>
                    <select class="w-full bg-slate-100 p-4 rounded-xl border-b-4 border-slate-200 font-black text-slate-600 outline-none roblox-font text-xs uppercase cursor-pointer">
                        <option>🥚 Новичок</option>
                        <option selected>🔥 Мастер</option>
                        <option>🏆 Легенда</option>
                    </select>
                </div>

                <a href="analysis.html" class="btn-attack block w-full text-white roblox-font italic uppercase py-8 rounded-[2.5rem] text-3xl tracking-widest">
                    Ход! ⚔️
                </a>
                
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Нажми, чтобы завершить ход</p>
            </div>
        </div>
    </main>
    <script src="state.js"></script>
    <script src="api.js"></script>
    <script>
        if (!window.roChessApi.isAuthenticated()) {
            window.location.href = 'h1.html';
        }
    </script>

</body>
</html>
