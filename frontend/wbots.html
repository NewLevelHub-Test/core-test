<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO-CHESS — Битва с ботом</title>

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .roblox-font {
            font-family: 'Montserrat', sans-serif;
        }

        .desktop-sidebar {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            border-right: 2px solid white;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        .board-frame {
            width: min(92vw, 620px);
            max-width: 620px;
            margin: 0 auto;
            border: 12px solid #393b3d;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 15px 0 #d1d5db;
            background: white;
            box-sizing: border-box;
            position: relative;
        }

        #myBoard {
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 2px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 8px 0 #e2e8f0;
        }

        .timer-neon {
            background: #000;
            border: 4px solid #393b3d;
            box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.3), 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-attack {
            background: linear-gradient(180deg, #ff6b6b 0%, #ff4747 100%);
            box-shadow: 0 10px 0 #b91c1c, 0 20px 40px rgba(239, 68, 68, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-attack:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .btn-attack:active:not(:disabled) {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #b91c1c;
        }

        .btn-attack:disabled,
        .action-btn:disabled,
        .orientation-btn:disabled,
        select:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .move-log {
            max-height: 320px;
            overflow-y: auto;
        }

        .move-log::-webkit-scrollbar {
            width: 8px;
        }

        .move-log::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }

        .status-box {
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .inline-message {
            border-radius: 20px;
            padding: 14px 16px;
            font-weight: 800;
            font-size: 0.95rem;
            animation: fadeInUp 0.22s ease;
        }

        .inline-message.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 2px solid #fecaca;
        }

        .inline-message.success {
            background: #ecfdf5;
            color: #047857;
            border: 2px solid #a7f3d0;
        }

        .inline-message.info {
            background: #eff6ff;
            color: #1d4ed8;
            border: 2px solid #bfdbfe;
        }

        .empty-state {
            background: rgba(248,250,252,0.92);
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            color: #64748b;
            font-weight: 800;
            animation: fadeInUp 0.22s ease;
        }

        .error-state {
            background: linear-gradient(180deg, rgba(254,242,242,0.95), rgba(255,255,255,0.98));
            border: 2px solid #fecaca;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            color: #991b1b;
            font-weight: 800;
            animation: fadeInUp 0.22s ease;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 999px;
            animation: spin 0.75s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        .spinner-dark {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(37,99,235,0.18);
            border-top-color: #2563eb;
            border-radius: 999px;
            animation: spin 0.75s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        .bot-thinking-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #eff6ff;
            border: 2px solid #bfdbfe;
            color: #1d4ed8;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            animation: fadeInUp 0.22s ease;
        }

        .board-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(2px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .board-overlay.show {
            display: flex;
        }

        .board-overlay-card {
            background: rgba(255,255,255,0.96);
            border: 2px solid white;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            border-radius: 24px;
            padding: 18px 22px;
            font-weight: 900;
            color: #1d4ed8;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 12px;
        }

        .skeleton {
            position: relative;
            overflow: hidden;
            background: #e2e8f0;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.6) 50%,
                rgba(255,255,255,0) 100%
            );
            animation: shimmer 1.25s infinite;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 120;
            background: rgba(15, 23, 42, 0.94);
            color: white;
            border-radius: 18px;
            padding: 14px 18px;
            font-weight: 800;
            box-shadow: 0 14px 30px rgba(0,0,0,0.18);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            max-width: calc(100vw - 32px);
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        .focus-ring:focus-visible,
        button:focus-visible,
        a:focus-visible,
        select:focus-visible,
        input:focus-visible {
            outline: 3px solid #60a5fa;
            outline-offset: 3px;
        }

        .btn-min {
            min-height: 48px;
            min-width: 48px;
        }

        .action-btn {
            min-height: 52px;
        }

        .orientation-btn {
            min-height: 64px;
            min-width: 64px;
        }

        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(4px);
            z-index: 130;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .confirm-overlay.show {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        .confirm-card {
            width: min(420px, 100%);
            background: rgba(255,255,255,0.98);
            border-radius: 28px;
            border: 2px solid white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            padding: 24px;
            animation: fadeInUp 0.2s ease;
        }

        .confirm-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .confirm-btn {
            min-height: 50px;
            border-radius: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            transition: all 0.2s ease;
        }

        .confirm-btn:active {
            transform: translateY(2px);
        }

        .fade-swap {
            animation: fadeIn 0.2s ease;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1279px) {
            .desktop-sidebar {
                box-shadow: 20px 0 40px rgba(0,0,0,0.12);
            }
        }

        @media (max-width: 1024px) {
            .glass-panel {
                border-radius: 24px;
            }

            .board-frame {
                width: min(84vw, 520px);
                border-width: 10px;
                border-radius: 24px;
            }
        }

        @media (max-width: 640px) {
            .glass-panel,
            .confirm-card,
            .empty-state,
            .error-state,
            .inline-message {
                border-radius: 22px;
            }

            .board-frame {
                width: min(94vw, 360px);
                border-width: 8px;
                border-radius: 20px;
            }

            .confirm-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script src="api.js"></script>
    <script>
        let board = null;
        let game = new Chess();
        let gameId = null;
        let timerInterval = null;
        let timeLeft = 300;
        let lastFinishedGameId = null;
        let isBotThinking = false;
        let isCreatingGame = false;
        let pendingPlayerMove = null;
        

        const liveRegion = document.getElementById('live-region');
        const toast = document.getElementById('toast');
        const pageMessage = document.getElementById('page-message');
        const botThinkingBox = document.getElementById('bot-thinking-box');
        const boardOverlay = document.getElementById('board-overlay');
        const resignModal = document.getElementById('resignConfirmModal');

        let toastTimer = null;

        function announce(message) {
            if (liveRegion) liveRegion.textContent = message;
        }

        function showToast(message, type = 'default') {
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.className = 'toast show';

            if (type === 'error') {
                toast.style.background = 'rgba(127, 29, 29, 0.96)';
            } else if (type === 'success') {
                toast.style.background = 'rgba(6, 78, 59, 0.96)';
            } else {
                toast.style.background = 'rgba(15, 23, 42, 0.94)';
            }

            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2400);
        }

        function showPageMessage(message, type = 'info') {
            pageMessage.className = `mb-5 inline-message ${type}`;
            pageMessage.textContent = message;
            pageMessage.classList.remove('hidden');
            announce(message);
        }

        function hidePageMessage() {
            pageMessage.classList.add('hidden');
            pageMessage.textContent = '';
        }

        function updateBotDifficultyLabel() {
            const difficultyEl = document.getElementById('difficulty');
            const labelEl = document.getElementById('bot-difficulty-label');

            if (!difficultyEl || !labelEl) return;

            const difficultyMap = {
                '1': 'CPU Boss: Новичок 🥚',
                '2': 'CPU Boss: Мастер 🔥',
                '3': 'CPU Boss: Легенда 🏆'
            };

            labelEl.textContent = difficultyMap[String(difficultyEl.value)] || 'CPU Boss: Мастер 🔥';
        }

        function setBotThinkingState(active) {
            isBotThinking = active;
            botThinkingBox.classList.toggle('hidden', !active);
            boardOverlay.classList.toggle('show', active);
            updateStatus();
        }

        function setControlsDisabled(disabled) {
            document.getElementById('difficulty').disabled = disabled;
            document.getElementById('time-limit').disabled = disabled;
            document.getElementById('orientation-white-btn').disabled = disabled;
            document.getElementById('orientation-black-btn').disabled = disabled;
            document.getElementById('resign-btn').disabled = disabled;
            document.getElementById('restart-btn').disabled = disabled;
        }

        function setRestartButtonLoading(isLoading) {
            const btn = document.getElementById('restart-btn');

            if (isLoading) {
                btn.innerHTML = `<span class="inline-flex items-center gap-3"><span class="spinner"></span>Создание...</span>`;
                btn.disabled = true;
            } else {
                btn.textContent = 'Restart 🔄';
                btn.disabled = false;
            }
        }

        function renderMoveLogEmpty() {
            const logContainer = document.getElementById('move-log');
            logContainer.innerHTML = `
                <div class="empty-state !p-4">
                    <div class="text-slate-500 font-bold">Пока ходов нет</div>
                </div>
            `;
        }

        function updateOrientationButtons(color) {
            const whiteBtn = document.getElementById('orientation-white-btn');
            const blackBtn = document.getElementById('orientation-black-btn');

            if (color === 'white') {
                whiteBtn.className = "orientation-btn w-16 h-16 md:w-20 md:h-20 rounded-[1.3rem] md:rounded-[1.5rem] border-4 border-blue-500 bg-blue-50 flex items-center justify-center text-3xl md:text-4xl shadow-inner ring-4 ring-blue-100 focus-ring";
                blackBtn.className = "orientation-btn w-16 h-16 md:w-20 md:h-20 rounded-[1.3rem] md:rounded-[1.5rem] border-4 border-slate-300 bg-slate-800 flex items-center justify-center text-3xl md:text-4xl hover:ring-4 ring-slate-200 transition-all focus-ring";
            } else {
                blackBtn.className = "orientation-btn w-16 h-16 md:w-20 md:h-20 rounded-[1.3rem] md:rounded-[1.5rem] border-4 border-blue-500 bg-slate-800 flex items-center justify-center text-3xl md:text-4xl shadow-inner ring-4 ring-blue-100 focus-ring";
                whiteBtn.className = "orientation-btn w-16 h-16 md:w-20 md:h-20 rounded-[1.3rem] md:rounded-[1.5rem] border-4 border-slate-300 bg-blue-50 flex items-center justify-center text-3xl md:text-4xl hover:ring-4 ring-slate-200 transition-all focus-ring";
            }
        }

        function resetTimer(seconds) {
            clearInterval(timerInterval);
            timeLeft = seconds;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    lastFinishedGameId = gameId;
                    showEndScreen("ВРЕМЯ ВЫШЛО", "Вы проиграли по времени ⌛");
                }
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const display = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            document.getElementById('timer').textContent = display;
        }

        function updateMoveLog(move) {
            const logContainer = document.getElementById('move-log');
            if (!logContainer) return;

            if (logContainer.textContent.includes('Пока ходов нет')) {
                logContainer.innerHTML = '';
            }

            const historyLength = game.history().length;
            const moveNumber = Math.ceil(historyLength / 2);

            if (historyLength % 2 === 1) {
                const moveDiv = document.createElement('div');
                moveDiv.className = "flex justify-between font-black text-slate-600 text-sm bg-slate-50 p-3 rounded-xl border border-white shadow-sm fade-swap";
                moveDiv.innerHTML = `<span>${moveNumber}. ${move.san}</span><span class="bot-move-placeholder text-blue-500">...</span>`;
                logContainer.appendChild(moveDiv);
            } else {
                const lastRow = logContainer.lastElementChild;
                if (lastRow) {
                    const botSpan = lastRow.querySelector('.bot-move-placeholder');
                    if (botSpan) {
                        botSpan.innerText = move.san;
                        botSpan.classList.remove('bot-move-placeholder');
                        botSpan.classList.add('text-indigo-600');
                    }
                }
            }

            logContainer.scrollTop = logContainer.scrollHeight;
        }

        async function startNewGame() {
            if (isCreatingGame) return;

            const difficulty = document.getElementById('difficulty').value;
            const color = board.orientation();
            const timeLimit = parseInt(document.getElementById('time-limit').value, 10) * 60;

            isCreatingGame = true;
            setControlsDisabled(true);
            setRestartButtonLoading(true);
            setBotThinkingState(false);
            showPageMessage('Создаю новую игру...', 'info');
            document.getElementById('game-status').textContent = 'Создание партии...';
            renderMoveLogEmpty();

            try {
                const data = await window.roChessApi.fetchWithAuth('games/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        difficulty: parseInt(difficulty, 10),
                        user_color: color,
                        time_control: timeLimit
                    })
                });

                gameId = data.game_id || data.id || data.game?.id || null;

                if (!gameId) {
                    throw new Error('Сервер не прислал ID игры');
                }

                game.reset();

                const initialFen = data.fen || data.position || 'start';
                if (initialFen === 'start') {
                    game.reset();
                    board.start();
                } else {
                    game.load(initialFen);
                    board.position(game.fen());
                }

                lastFinishedGameId = null;
                pendingPlayerMove = null;
                resetTimer(timeLimit);
                updateOrientationButtons(color);
                updateStatus();
                hidePageMessage();
                showToast('Новая игра готова', 'success');

                setTimeout(() => {
                    if (board) board.resize();
                }, 120);

            } catch (err) {
                console.error("Ошибка создания игры:", err);
                document.getElementById('game-status').innerHTML = `
                    <div class="error-state w-full">
                        <div class="text-lg font-black text-red-700 mb-2">Ой, что-то пошло не так!</div>
                        <div class="text-red-600 font-bold">${err.message || 'Не удалось создать игру.'}</div>
                    </div>
                `;
                showPageMessage(`Ой, что-то пошло не так! ${err.message || 'Не удалось создать игру.'}`, 'error');
                showToast('Не удалось создать игру', 'error');
            } finally {
                isCreatingGame = false;
                setControlsDisabled(false);
                setRestartButtonLoading(false);
            }
        }

        async function onDrop(source, target) {
            if (isBotThinking || isCreatingGame) return 'snapback';

            const move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            pendingPlayerMove = { source, target, move };
            board.position(game.fen());
            updateMoveLog(move);
            updateStatus();

            try {
                setBotThinkingState(true);

                const response = await window.roChessApi.fetchWithAuth(`games/${gameId}/move`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ move: source + target })
                });

                console.log("Ответ сервера после хода:", response);

                const aiMoveData = response.ai_move || response.bot_move || response.engine_move || null;

                if (response.game_over && !aiMoveData) {
                    setBotThinkingState(false);
                    lastFinishedGameId = gameId;
                    showEndScreen("ИГРА ОКОНЧЕНА", response.result || "Игра завершена");
                    return;
                }

                if (aiMoveData) {
                    setTimeout(() => {
                        try {
                            if (typeof aiMoveData === 'string') {
                                const botMove = game.move({
                                    from: aiMoveData.slice(0, 2),
                                    to: aiMoveData.slice(2, 4),
                                    promotion: aiMoveData.length > 4 ? aiMoveData.slice(4) : 'q'
                                });

                                if (!botMove) {
                                    throw new Error("Не удалось применить строковый ход бота");
                                }

                                board.position(game.fen());
                                updateMoveLog(botMove);
                                updateStatus();
                            } else if (aiMoveData.from && aiMoveData.to) {
                                const botMove = game.move({
                                    from: aiMoveData.from,
                                    to: aiMoveData.to,
                                    promotion: aiMoveData.promotion || 'q'
                                });

                                if (!botMove) {
                                    throw new Error("Не удалось применить ход бота from/to");
                                }

                                board.position(game.fen());
                                updateMoveLog(botMove);
                                updateStatus();
                            } else if (aiMoveData.fen_after) {
                                const loaded = game.load(aiMoveData.fen_after);

                                if (!loaded) {
                                    throw new Error("Не удалось загрузить позицию после хода бота");
                                }

                                board.position(game.fen());

                                const fakeBotMove = {
                                    san: aiMoveData.notation || aiMoveData.move || "бот сходил"
                                };

                                updateMoveLog(fakeBotMove);
                                updateStatus();
                            } else {
                                throw new Error("Неизвестный формат ai_move");
                            }

                            if (game.in_checkmate()) {
                                lastFinishedGameId = gameId;
                                showEndScreen("ПОРАЖЕНИЕ", "Бот поставил вам мат! 🤖");
                                return;
                            }

                            if (game.in_draw()) {
                                lastFinishedGameId = gameId;
                                showEndScreen("НИЧЬЯ", "Партия завершилась вничью");
                                return;
                            }

                            if (response.game_over) {
                                lastFinishedGameId = gameId;
                                showEndScreen("ИГРА ОКОНЧЕНА", response.result || "Игра завершена");
                                return;
                            }
                        } catch (innerErr) {
                            console.error(innerErr);
                            showPageMessage('Ой, что-то пошло не так! Не удалось применить ход бота.', 'error');
                            showToast('Ошибка хода бота', 'error');
                        } finally {
                            setBotThinkingState(false);
                        }
                    }, 650);
                } else {
                    setBotThinkingState(false);
                }

            } catch (err) {
                console.error("Ошибка хода:", err);
                game.undo();
                board.position(game.fen());

                const logContainer = document.getElementById('move-log');
                const lastRow = logContainer.lastElementChild;
                if (lastRow && lastRow.textContent.includes(move.san)) {
                    lastRow.remove();
                    if (!logContainer.children.length) {
                        renderMoveLogEmpty();
                    }
                }

                updateStatus();
                setBotThinkingState(false);
                showPageMessage(`Ой, что-то пошло не так! ${err.message || 'Не удалось сделать ход.'}`, 'error');
                showToast('Ход не отправлен', 'error');
                return 'snapback';
            }
        }

        function openResignConfirm() {
            if (!gameId || game.game_over()) return;
            resignModal.classList.add('show');
            resignModal.setAttribute('aria-hidden', 'false');
        }

        function closeResignConfirm() {
            resignModal.classList.remove('show');
            resignModal.setAttribute('aria-hidden', 'true');
        }

        async function confirmResign() {
            if (!gameId || game.game_over()) return;

            try {
                await window.roChessApi.fetchWithAuth(`games/${gameId}/resign`, {
                    method: 'POST'
                });
                closeResignConfirm();
                lastFinishedGameId = gameId;
                showEndScreen("ПОРАЖЕНИЕ", "Вы сдались");
            } catch (err) {
                console.error("Ошибка при сдаче:", err);
                closeResignConfirm();
                showPageMessage(`Ой, что-то пошло не так! ${err.message || 'Не удалось сдаться.'}`, 'error');
                showToast('Не удалось сдаться', 'error');
            }
        }

        function showEndScreen(title, message) {
            clearInterval(timerInterval);
            setBotThinkingState(false);
            document.getElementById('endResultTitle').innerText = title;
            document.getElementById('endResultMessage').innerText = message;
            document.getElementById('endGameModal').classList.remove('hidden');
        }

        function closeEndModal() {
            document.getElementById('endGameModal').classList.add('hidden');
        }

        function goToAnalysis() {
            if (lastFinishedGameId) {
                window.location.href = `analysis.html?id=${lastFinishedGameId}`;
            } else {
                window.location.href = 'hist.html';
            }
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over() || isBotThinking || isCreatingGame) return false;

            if ((orientation === 'white' && piece.search(/^b/) !== -1) ||
                (orientation === 'black' && piece.search(/^w/) !== -1)) {
                return false;
            }

            if ((orientation === 'white' && game.turn() !== 'w') ||
                (orientation === 'black' && game.turn() !== 'b')) {
                return false;
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function updateStatus() {
            let status = '';

            if (isCreatingGame) {
                status = 'Создание партии...';
            } else if (isBotThinking) {
                status = 'Бот думает...';
            } else if (game.in_checkmate()) {
                status = 'МАТ!';
            } else if (game.in_draw()) {
                status = 'НИЧЬЯ!';
            } else {
                const orientation = board.orientation();
                const playerTurn =
                    (orientation === 'white' && game.turn() === 'w') ||
                    (orientation === 'black' && game.turn() === 'b');

                status = playerTurn ? 'Твой ход...' : 'Ожидание хода бота...';
            }

            document.getElementById('game-status').innerText = status;
            document.getElementById('fen-display').innerText = game.fen();
        }

        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        function resetGame() {
            closeEndModal();
            startNewGame();
        }

        function setOrientation(color) {
            if (isCreatingGame || isBotThinking) return;
            board.orientation(color);
            updateOrientationButtons(color);
            startNewGame();
        }

        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');
        const sidebar = document.getElementById('sidebar');

        function openMobileMenu() {
            sidebar.classList.remove('-translate-x-full');
            mobileOverlay.classList.remove('hidden');
            mobileMenuBtn.setAttribute('aria-label', 'Закрыть меню');
        }

        function closeMobileMenu() {
            if (window.innerWidth < 1280) {
                sidebar.classList.add('-translate-x-full');
            }
            mobileOverlay.classList.add('hidden');
            mobileMenuBtn.setAttribute('aria-label', 'Открыть меню');
        }

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                if (sidebar.classList.contains('-translate-x-full')) {
                    openMobileMenu();
                } else {
                    closeMobileMenu();
                }
            });
        }

        if (mobileOverlay) {
            mobileOverlay.addEventListener('click', closeMobileMenu);
        }

        document.getElementById('cancel-resign-btn').addEventListener('click', closeResignConfirm);
        document.getElementById('confirm-resign-btn').addEventListener('click', confirmResign);
        document.getElementById('difficulty').addEventListener('change', updateBotDifficultyLabel);

        resignModal.addEventListener('click', (e) => {
            if (e.target === resignModal) {
                closeResignConfirm();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMobileMenu();
                closeResignConfirm();
            }
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1280) {
                mobileOverlay?.classList.add('hidden');
                sidebar?.classList.remove('-translate-x-full');
            } else {
                sidebar?.classList.add('-translate-x-full');
            }

            if (board) {
                setTimeout(() => {
                    board.resize();
                }, 100);
            }
        });

        window.addEventListener('load', () => {
            if (board) {
                setTimeout(() => {
                    board.resize();
                }, 150);
            }
        });

        board = Chessboard('myBoard', config);

        setTimeout(() => {
            board.resize();
        }, 100);
        
        updateBotDifficultyLabel();
        renderMoveLogEmpty();
        startNewGame();
    </script>
</body>
</html>
