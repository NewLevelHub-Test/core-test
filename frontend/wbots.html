<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Chess - Battle with Bot</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); 
            min-height: 100vh;
            overflow-x: hidden;
        }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        
        .desktop-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 2px solid white;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        #myBoard {
            width: 100%;
            max-width: 600px;
            border: 12px solid #393b3d;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 15px 0 #d1d5db;
        }
        .white-1e1d7 { background-color: #ffffff; }
        .black-3c85d { background-color: #3b82f6; }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            border-radius: 32px; 
            border: 2px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 8px 0 #e2e8f0;
        }

        .timer-neon {
            background: #000;
            border: 4px solid #393b3d;
            box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.3), 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-attack {
            background: linear-gradient(180deg, #ff6b6b 0%, #ff4747 100%);
            box-shadow: 0 10px 0 #b91c1c, 0 20px 40px rgba(239, 68, 68, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-attack:active { transform: translateY(8px); box-shadow: 0 2px 0 #b91c1c; }
    </style>
</head>
<body class="flex">

    <aside class="w-72 desktop-sidebar h-screen sticky top-0 flex flex-col p-8 z-50">
        <div class="mb-12 text-center">
            <div class="bg-[#00b06f] text-white roblox-font italic uppercase text-2xl px-4 py-2 rounded-xl shadow-lg border-t-2 border-white/30 inline-block transform -rotate-2">
                RO-CHESS
            </div>
        </div>
        <nav class="space-y-4 flex-1">
            <a href="Dashboard.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">🏠</span> Дом
            </a>
            <a href="wbots.html" class="flex items-center gap-4 p-4 bg-red-50 rounded-2xl text-red-600 font-black uppercase text-xs tracking-widest border-b-4 border-red-100">
                <span class="text-2xl">⚔️</span> Баттл
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-10 flex flex-col items-center">
        <div class="w-full max-w-6xl flex justify-between items-center mb-10 px-6">
            <div class="flex items-center gap-6">
                <div class="bg-[#393b3d] text-white px-8 py-4 rounded-[2rem] flex items-center gap-4 shadow-2xl border-t-2 border-white/10">
                    <span class="text-4xl animate-bounce">🤖</span>
                    <div class="text-left">
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Соперник</p>
                        <p class="font-black text-xl roblox-font italic uppercase">CPU Boss: Мастер 🔥</p>
                    </div>
                </div>
            </div>

            <div id="timer" class="timer-neon text-emerald-400 px-10 py-4 rounded-[2rem] roblox-font italic text-4xl tracking-tighter border-2 border-white/5">
                05:00
            </div>
        </div>

        <div class="w-full max-w-7xl grid grid-cols-12 gap-12 items-center">
            <div class="col-span-3 space-y-6">
                <div class="glass-panel p-8 text-center">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 italic">Твой цвет</p>
                    <div class="flex justify-center gap-6">
                        <button onclick="setOrientation('white')" class="w-20 h-20 rounded-[1.5rem] border-4 border-blue-500 bg-blue-50 flex items-center justify-center text-4xl shadow-inner ring-4 ring-blue-100">⚪</button>
                        <button onclick="setOrientation('black')" class="w-20 h-20 rounded-[1.5rem] border-4 border-slate-300 bg-slate-800 flex items-center justify-center text-4xl hover:ring-4 ring-slate-200 transition-all">⚫</button>
                    </div>
                </div>

                <div class="glass-panel p-8">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 italic">Статус боя</p>
                    <div id="game-status" class="font-black text-indigo-600 text-sm bg-indigo-50 p-4 rounded-xl border-2 border-white shadow-sm uppercase italic">
                        Твой ход...
                    </div>
                </div>
            </div>

            <div class="col-span-6 flex justify-center">
                <div id="myBoard"></div>
            </div>

            <div class="col-span-3 space-y-6 text-center">
                <div class="glass-panel p-8">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Настройки</p>
                    
                    <select id="difficulty" class="w-full bg-slate-100 p-4 rounded-xl border-b-4 border-slate-200 font-black text-slate-600 mb-4 text-xs uppercase cursor-pointer">
                        <option value="1">🥚 Новичок</option>
                        <option value="2" selected>🔥 Мастер</option>
                        <option value="3">🏆 Легенда</option>
                    </select>
                
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-2">Время (мин)</p>
                    <select id="time-limit" class="w-full bg-slate-100 p-4 rounded-xl border-b-4 border-slate-200 font-black text-slate-600 text-xs uppercase cursor-pointer">
                        <option value="1">1 минута</option>
                        <option value="5" selected>5 минут</option>
                        <option value="10">10 минут</option>
                    </select>
                </div>

                <button onclick="confirmResign()" class="w-full bg-slate-800 text-white roblox-font italic uppercase py-4 rounded-2xl text-sm border-b-4 border-black active:translate-y-1 transition-all mt-4">
                    Сдаться 🏳️
                </button>
                
                <div id="endGameModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                    <div class="glass-panel max-w-sm w-full p-10 text-center scale-up-animation">
                        <h2 id="endResultTitle" class="roblox-font italic uppercase text-4xl mb-2 text-indigo-600">ПОБЕДА!</h2>
                        <p id="endResultMessage" class="font-black text-slate-500 uppercase text-xs tracking-widest mb-8">Вы поставили мат боту</p>
                        
                        <div class="flex flex-col gap-4">
                            <button onclick="location.href='analysis.html'" class="btn-attack w-full py-4 text-white roblox-font italic uppercase rounded-2xl shadow-lg">
                                Разбор 📊
                            </button>
                            <button onclick="closeEndModal(); resetGame();" class="w-full py-4 bg-slate-100 text-slate-600 roblox-font italic uppercase rounded-2xl border-b-4 border-slate-200">
                                Новая игра 🔄
                            </button>
                        </div>
                    </div>
                </div>

                <button onclick="resetGame()" class="btn-attack block w-full text-white roblox-font italic uppercase py-8 rounded-[2.5rem] text-3xl tracking-widest">
                    RESTART 🔄
                </button>
                
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-4 break-all font-mono" id="fen-display"></p>
            </div>
        </div>
    </main>

    <script src="api.js"></script>
    <script>
        var board = null;
        var game = new Chess();
        var gameId = null; 
        var timerInterval = null;
        var timeLeft = 300;

        function resetTimer(seconds) {
            clearInterval(timerInterval);
            timeLeft = seconds;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showEndScreen("ВРЕМЯ ВЫШЛО", "Вы проиграли по времени ⌛");
                }
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const display = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            document.getElementById('timer').textContent = display;
        }

        function updateMoveLog(move) {
            const logContainer = document.querySelector('.glass-panel .space-y-3');
            if (!logContainer) return;

            const moveNumber = Math.ceil(game.history().length / 2);
            
            if (game.turn() === 'b') { 
                const moveDiv = document.createElement('div');
                moveDiv.className = "flex justify-between font-black text-slate-600 text-sm bg-slate-50 p-3 rounded-xl border border-white shadow-sm";
                moveDiv.innerHTML = `<span>${moveNumber}. ${move.san}</span><span class="bot-move-placeholder animate-pulse">...</span>`;
                logContainer.appendChild(moveDiv);
            } else { 
                const lastRow = logContainer.lastElementChild;
                if (lastRow) {
                    const botSpan = lastRow.querySelector('.bot-move-placeholder');
                    if (botSpan) {
                        botSpan.innerText = move.san;
                        botSpan.classList.remove('bot-move-placeholder', 'animate-pulse');
                        botSpan.classList.add('text-indigo-600');
                    }
                }
            }
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        async function startNewGame() {
            const difficulty = document.getElementById('difficulty').value;
            const color = board.orientation();
            const timeLimitSelect = document.getElementById('time-limit');
            const timeLimit = timeLimitSelect ? parseInt(timeLimitSelect.value) * 60 : 300;

            try {
                const data = await window.roChessApi.fetchWithAuth('games/', {
                    method: 'POST',
                    body: JSON.stringify({
                        difficulty: parseInt(difficulty),
                        user_color: color,
                        time_control: timeLimit
                    })
                });

                gameId = data.game_id || data.id || data.game?.id;
                
                if (!gameId) {
                    console.error("Сервер не прислал ID игры!");
                    return;
                }

                game.reset();
                game.load(data.fen || 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
                board.position(game.fen());
                
                const logContainer = document.querySelector('.glass-panel .space-y-3');
                if (logContainer) logContainer.innerHTML = '';

                resetTimer(timeLimit);
                updateStatus();
            } catch (err) {
                console.error("Ошибка создания игры:", err);
            }
        }

        async function onDrop(source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateMoveLog(move); 
            updateStatus();

            try {
                const response = await window.roChessApi.fetchWithAuth(`games/${gameId}/move`, {
                    method: 'POST',
                    body: JSON.stringify({ move: source + target })
                });

                if (response.bot_move) {
                    setTimeout(() => {
                        const botMove = game.move(response.bot_move, { sloppy: true });
                        board.position(game.fen());
                        updateMoveLog(botMove);
                        updateStatus();
                        
                        if (game.in_checkmate()) {
                            showEndScreen("ПОРАЖЕНИЕ", "Бот поставил вам мат! 🤖");
                        }
                    }, 500);
                }
                
                if (response.game_over) {
                    showEndScreen("ИГРА ОКОНЧЕНА", response.result);
                }

            } catch (err) {
                console.error("Ошибка хода:", err);
                game.undo(); 
                board.position(game.fen());
            }
        }

        async function confirmResign() {
            if (!gameId || game.game_over()) return;
            if (!confirm("Вы действительно хотите сдаться? 🏳️")) return;

            try {
                await window.roChessApi.fetchWithAuth(`games/${gameId}/resign`, { method: 'POST' });
                showEndScreen("ПОРАЖЕНИЕ", "Вы сдались");
            } catch (err) {
                console.error("Ошибка при сдаче:", err);
            }
        }

        function showEndScreen(title, message) {
            clearInterval(timerInterval);
            const modal = document.getElementById('endGameModal');
            if (modal) {
                document.getElementById('endResultTitle').innerText = title;
                document.getElementById('endResultMessage').innerText = message;
                modal.classList.remove('hidden');
            } else {
                alert(`${title}\n${message}`);
            }
        }

        function closeEndModal() {
            const modal = document.getElementById('endGameModal');
            if (modal) modal.classList.add('hidden');
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((orientation === 'white' && piece.search(/^b/) !== -1) ||
                (orientation === 'black' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function updateStatus() {
            var status = game.turn() === 'w' ? 'Белые ходят' : 'Бот думает...';
            if (game.in_checkmate()) status = 'МАТ!';
            if (game.in_draw()) status = 'НИЧЬЯ!';
            
            $('#game-status').html(status);
            $('#fen-display').html(game.fen());
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = Chessboard('myBoard', config);
        startNewGame();

        function resetGame() {
            startNewGame();
        }

        function setOrientation(color) {
            board.orientation(color);
            startNewGame();
        }
    </script>

</body>
</html>
