<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Chess - Desktop Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); 
            min-height: 100vh;
        }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        
        .desktop-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 2px solid white;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        .luxury-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            border-radius: 40px; 
            border: 2px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05), 0 10px 0 #e2e8f0;
        }

        .luxury-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        .badge-slot {
            background: white;
            border-radius: 24px;
            border-bottom: 6px solid #f1f5f9;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .badge-slot:hover { transform: scale(1.1) rotate(5deg); border-color: #e2e8f0; }
    </style>
</head>
<body class="flex">

    <aside class="w-72 desktop-sidebar h-screen sticky top-0 flex flex-col p-8 z-50">
        <div class="mb-12 text-center">
            <div class="bg-[#00b06f] text-white roblox-font italic uppercase text-2xl px-4 py-2 rounded-xl shadow-lg border-t-2 border-white/30 inline-block transform -rotate-2">
                RO-CHESS
            </div>
        </div>

        <nav class="space-y-4 flex-1">
            <a href="Dashboard.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">🏠</span> Дом
            </a>
            <a href="profile.html" class="flex items-center gap-4 p-4 bg-indigo-50 rounded-2xl text-indigo-600 font-black uppercase text-xs tracking-widest border-b-4 border-indigo-100">
                <span class="text-2xl">👤</span> Профиль
            </a>
            <a href="study.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">📖</span> Уроки
            </a>
            <a href="admin.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">⚙️</span> Админ
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-12 max-w-[1100px] mx-auto">
        
        <div class="grid grid-cols-12 gap-10">
            
            <div class="col-span-5">
                <div class="luxury-card p-10 text-center sticky top-12">
                    <div class="relative mb-8 inline-block">
                        <div class="absolute -inset-4 luxury-gradient rounded-[3.5rem] blur-xl opacity-20 animate-pulse"></div>
                        <div class="relative w-48 h-48 bg-white rounded-[3rem] border-8 border-white shadow-2xl overflow-hidden ring-4 ring-indigo-50">
                            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=ChessMaster77" alt="Avatar" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute bottom-2 right-2 bg-emerald-500 text-white text-xs font-black px-5 py-2 rounded-full border-4 border-white uppercase shadow-lg">
                            Online
                        </div>
                    </div>
                    
                    <h1 class="text-4xl font-black roblox-font italic uppercase tracking-tighter text-slate-800 leading-none mb-3">
                        ChessMaster_77
                    </h1>
                    <p class="text-indigo-400 font-black text-sm uppercase tracking-[0.3em] mb-8">@ProPlayer_2026</p>

                    <div class="space-y-4">
                        <a href="admin.html" class="block w-full bg-slate-800 text-white font-black py-5 rounded-[1.5rem] text-center uppercase italic roblox-font tracking-widest text-sm hover:bg-black transition-all shadow-xl">
                            Редактировать ⚙️
                        </a>
                        <button class="block w-full bg-white text-slate-400 font-black py-4 rounded-[1.5rem] text-center uppercase text-[10px] tracking-widest border-2 border-slate-50 hover:bg-slate-50 transition-all">
                            Выйти из аккаунта
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-span-7 space-y-8">
                
                <div class="grid grid-cols-2 gap-6">
                    <div class="luxury-card p-8 flex flex-col items-center">
                        <span class="text-slate-400 text-[11px] font-black uppercase mb-2 tracking-widest">Твой возраст</span>
                        <span class="text-3xl font-black text-slate-700 roblox-font italic">10 ЛЕТ</span>
                    </div>
                    <div class="luxury-card p-8 flex flex-col items-center border-l-8 border-l-indigo-500">
                        <span class="text-indigo-400 text-[11px] font-black uppercase mb-2 tracking-widest">Текущий ранг</span>
                        <span class="text-3xl font-black text-indigo-600 roblox-font italic">GOLD V</span>
                    </div>
                </div>

                <div class="luxury-card p-10">
                    <div class="flex justify-between items-end mb-5 px-2">
                        <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest">Уровень мастерства (XP)</h3>
                        <span class="text-indigo-600 font-black text-sm italic bg-indigo-50 px-4 py-2 rounded-2xl">2,450 / 3,000</span>
                    </div>
                    <div class="w-full bg-slate-100 h-12 rounded-[1.5rem] p-2 shadow-inner relative overflow-hidden border-2 border-white">
                        <div class="luxury-gradient h-full rounded-xl shadow-[0_0_20px_rgba(99,102,241,0.3)] relative z-10" style="width: 75%">
                            <div class="absolute top-0 left-0 w-full h-1/2 bg-white/20 rounded-full"></div>
                        </div>
                    </div>
                    <p class="mt-4 text-[11px] text-slate-400 text-center font-bold uppercase italic tracking-widest">Следующее звание: PLATINUM I 🏆</p>
                </div>

                <div class="luxury-card p-10">
                    <h3 class="text-slate-400 font-black text-xs uppercase mb-8 tracking-[0.4em] text-center">Заработанные награды</h3>
                    <div class="grid grid-cols-3 gap-6">
                        <div class="badge-slot p-6 flex flex-col items-center gap-3">
                            <span class="text-5xl">🏆</span>
                            <span class="text-[9px] font-black text-slate-400 uppercase">Чемпион</span>
                        </div>
                        <div class="badge-slot p-6 flex flex-col items-center gap-3">
                            <span class="text-5xl">🧠</span>
                            <span class="text-[9px] font-black text-slate-400 uppercase">Тактик</span>
                        </div>
                        <div class="badge-slot p-6 flex flex-col items-center gap-3">
                            <span class="text-5xl">🔥</span>
                            <span class="text-[9px] font-black text-slate-400 uppercase">В огне</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
