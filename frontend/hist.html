<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Legends — История партий</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%);
            min-height: 100vh;
        }

        .roblox-font {
            font-family: 'Montserrat', sans-serif;
        }

        .desktop-sidebar {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            border-right: 2px solid white;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 2px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 8px 0 #e2e8f0;
        }

        .history-card {
            transition: all 0.22s ease;
            border-bottom: 6px solid #f1f5f9;
            animation: fadeInUp 0.22s ease;
        }

        .history-card:hover {
            transform: translateY(-4px);
            border-bottom-color: #3b82f6;
        }

        .status-win { color: #10b981; background: #ecfdf5; }
        .status-loss { color: #ef4444; background: #fef2f2; }
        .status-draw { color: #64748b; background: #f1f5f9; }

        .skeleton {
            position: relative;
            overflow: hidden;
            background: #e2e8f0;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.6) 50%,
                rgba(255,255,255,0) 100%
            );
            animation: shimmer 1.25s infinite;
        }

        .empty-state {
            background: rgba(248,250,252,0.92);
            border: 2px dashed #cbd5e1;
            border-radius: 28px;
            padding: 28px;
            text-align: center;
            color: #64748b;
            font-weight: 800;
            animation: fadeInUp 0.25s ease;
        }

        .error-state {
            background: linear-gradient(180deg, rgba(254,242,242,0.95), rgba(255,255,255,0.98));
            border: 2px solid #fecaca;
            border-radius: 28px;
            padding: 28px;
            text-align: center;
            color: #991b1b;
            font-weight: 800;
            animation: fadeInUp 0.25s ease;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 120;
            background: rgba(15, 23, 42, 0.94);
            color: white;
            border-radius: 18px;
            padding: 14px 18px;
            font-weight: 800;
            box-shadow: 0 14px 30px rgba(0,0,0,0.18);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            max-width: calc(100vw - 32px);
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        .focus-ring:focus-visible,
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 3px solid #60a5fa;
            outline-offset: 3px;
        }

        .page-btn {
            min-height: 48px;
        }

        .action-btn {
            min-height: 48px;
            min-width: 48px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1279px) {
            .desktop-sidebar {
                box-shadow: 20px 0 40px rgba(0,0,0,0.12);
            }
        }

        @media (max-width: 1024px) {
            .glass-panel {
                border-radius: 24px;
            }
        }

        @media (max-width: 640px) {
            .glass-panel {
                border-radius: 22px;
            }

            .empty-state,
            .error-state {
                border-radius: 22px;
                padding: 20px;
            }
        }
    </style>
</head>
<body class="bg-slate-50 xl:flex">
    <div id="live-region" class="sr-only" aria-live="polite"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- MOBILE HEADER -->
    <header class="xl:hidden sticky top-0 z-[90] bg-white/90 backdrop-blur-xl border-b border-slate-100 px-4 py-3 flex items-center justify-between">
        <img src="gml.png" alt="GM Legends" class="h-10 rounded-xl">

        <button
            id="mobile-menu-btn"
            class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center text-2xl"
            aria-label="Открыть меню"
            type="button"
        >
            ☰
        </button>
    </header>

    <div id="mobile-overlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-[80] xl:hidden"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-72 h-screen fixed xl:sticky top-0 left-0 flex flex-col p-8 border-r-2 border-white desktop-sidebar z-[85] -translate-x-full xl:translate-x-0 transition-transform duration-300">
        <div class="mb-12 text-center">
            <img src="gml.png" alt="GM Legends" class="h-14 rounded-xl inline-block">
        </div>

        <nav class="space-y-4 flex-1" aria-label="Основная навигация">
            <a href="Dashboard.html" class="flex items-center gap-4 p-4 min-h-[52px] hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all" aria-label="Перейти на главную">
                <span class="text-2xl">🏠</span> Дом
            </a>
            <a href="wbots.html" class="flex items-center gap-4 p-4 min-h-[52px] hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all" aria-label="Перейти к игре с ботом">
                <span class="text-2xl">⚔️</span> Баттл
            </a>
            <a href="hist.html" class="flex items-center gap-4 p-4 min-h-[52px] bg-blue-50 rounded-2xl text-blue-600 font-black uppercase text-xs tracking-widest border-b-4 border-blue-100" aria-label="Текущая страница: история">
                <span class="text-2xl">📜</span> История
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-4 md:p-6 xl:p-12 max-w-[1300px] mx-auto w-full">
        <header class="flex flex-col md:flex-row md:justify-between md:items-center gap-5 mb-8 md:mb-10 xl:mb-12">
            <div>
                <h1 class="roblox-font italic uppercase text-2xl md:text-3xl xl:text-4xl text-slate-800">
                    Твои Сражения 📜
                </h1>
                <p class="text-slate-400 font-black uppercase text-[10px] tracking-[0.2em] mt-2">
                    Архив всех шахматных битв
                </p>
            </div>

            <div class="glass-panel px-6 md:px-8 py-4 text-center w-full md:w-auto" aria-live="polite">
                <p class="text-[10px] font-black text-slate-400 uppercase">Всего игр</p>
                <p id="total-games" class="text-2xl font-black text-indigo-600">—</p>
            </div>
        </header>

        <div id="history-grid" class="space-y-4 md:space-y-6 max-w-5xl" aria-live="polite"></div>

        <div class="flex flex-wrap justify-center items-center gap-3 md:gap-4 mt-8 md:mt-12">
            <button id="prev-page" class="page-btn px-5 py-4 bg-white rounded-2xl font-black text-xs uppercase border-b-4 border-slate-200 disabled:opacity-30" aria-label="Предыдущая страница" type="button">
                Назад
            </button>
            <span id="page-info" class="flex items-center font-black text-slate-400 uppercase text-xs text-center px-2" aria-live="polite">
                Страница 1
            </span>
            <button id="next-page" class="page-btn px-5 py-4 bg-white rounded-2xl font-black text-xs uppercase border-b-4 border-slate-200 disabled:opacity-30" aria-label="Следующая страница" type="button">
                Вперёд
            </button>
        </div>
    </main>

    <script src="state.js"></script>
    <script src="api.js"></script>
    <script>
        if (!window.roChessApi || !window.roChessApi.isAuthenticated || !window.roChessApi.isAuthenticated()) {
            window.location.href = 'h1.html';
        }

        let currentPage = 1;
        const limit = 10;
        const liveRegion = document.getElementById('live-region');
        const toast = document.getElementById('toast');
        let toastTimer = null;

        function announce(message) {
            if (liveRegion) liveRegion.textContent = message;
        }

        function showToast(message, type = 'default') {
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.className = 'toast show';

            if (type === 'error') {
                toast.style.background = 'rgba(127, 29, 29, 0.96)';
            } else if (type === 'success') {
                toast.style.background = 'rgba(6, 78, 59, 0.96)';
            } else {
                toast.style.background = 'rgba(15, 23, 42, 0.94)';
            }

            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2400);
        }

        function escapeHtml(text) {
            if (text == null) return '';
            return String(text)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function renderTotalGamesSkeleton() {
            document.getElementById('total-games').innerHTML = '<div class="h-8 w-16 rounded-xl skeleton mx-auto"></div>';
        }

        function renderHistorySkeleton(count = 4) {
            const grid = document.getElementById('history-grid');
            grid.innerHTML = Array.from({ length: count }).map(() => `
                <div class="glass-panel p-5 md:p-6 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">
                    <div class="flex flex-col md:flex-row md:flex-wrap md:items-center gap-4 md:gap-6 lg:gap-8 min-w-0 flex-1">
                        <div class="h-10 w-28 rounded-2xl skeleton"></div>
                        <div>
                            <div class="h-3 w-12 rounded-xl skeleton mb-2"></div>
                            <div class="h-5 w-24 rounded-xl skeleton"></div>
                        </div>
                        <div>
                            <div class="h-3 w-10 rounded-xl skeleton mb-2"></div>
                            <div class="h-5 w-16 rounded-xl skeleton"></div>
                        </div>
                        <div>
                            <div class="h-3 w-10 rounded-xl skeleton mb-2"></div>
                            <div class="h-5 w-16 rounded-xl skeleton"></div>
                        </div>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                        <div class="h-12 w-full sm:w-28 rounded-2xl skeleton"></div>
                        <div class="h-12 w-full sm:w-32 rounded-2xl skeleton"></div>
                    </div>
                </div>
            `).join('');
        }

        function renderEmptyState() {
            const grid = document.getElementById('history-grid');
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="text-4xl mb-3">♟️</div>
                    <div class="text-slate-700 text-lg font-black mb-2">Пока нет партий — сыграй первую!</div>
                    <div class="text-slate-500 font-bold mb-5">Как только сыграешь матч с ботом, он появится здесь.</div>
                    <a
                        href="wbots.html"
                        class="inline-flex items-center justify-center px-6 py-3 min-h-[48px] bg-blue-500 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-[0_8px_0_#2563eb] active:translate-y-[4px]"
                        aria-label="Перейти к первой игре"
                    >
                        Сыграть сейчас
                    </a>
                </div>
            `;
        }

        function renderErrorState(message = 'Не удалось загрузить историю.') {
            const grid = document.getElementById('history-grid');
            grid.innerHTML = `
                <div class="error-state">
                    <div class="text-4xl mb-3">😵</div>
                    <div class="text-lg font-black text-red-700 mb-2">Ой, что-то пошло не так!</div>
                    <div class="text-red-600 font-bold mb-5">${escapeHtml(message)}</div>
                    <button
                        id="retry-history-btn"
                        type="button"
                        class="px-6 py-3 min-h-[48px] bg-red-500 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-[0_8px_0_#dc2626] active:translate-y-[4px]"
                        aria-label="Попробовать снова"
                    >
                        Попробовать снова
                    </button>
                </div>
            `;

            const retryBtn = document.getElementById('retry-history-btn');
            if (retryBtn) {
                retryBtn.addEventListener('click', () => loadHistory(currentPage));
            }
        }

        async function loadHistory(page = 1) {
            const grid = document.getElementById('history-grid');
            const prevBtn = document.getElementById('prev-page');
            const nextBtn = document.getElementById('next-page');

            renderTotalGamesSkeleton();
            renderHistorySkeleton();
            announce('Загружается история партий');

            if (prevBtn) prevBtn.disabled = true;
            if (nextBtn) nextBtn.disabled = true;

            try {
                const data = await window.roChessApi.fetchWithAuth(`games/history?page=${page}&limit=${limit}`);
                const games = data.games || data || [];
                const total = data.total || games.length || 0;

                document.getElementById('total-games').innerText = total;
                document.getElementById('page-info').innerText = `Страница ${page}`;

                if (prevBtn) prevBtn.disabled = page <= 1;
                if (nextBtn) nextBtn.disabled = games.length < limit;

                if (!games.length) {
                    renderEmptyState();
                    announce('История пока пуста');
                    return;
                }

                grid.innerHTML = games.map(game => {
                    let resClass = 'status-draw';
                    let resText = 'Ничья';

                    const rt = game.result_text || game.result;
                    if (rt === 'win' || rt === '1-0' && game.player_color === 'white' || rt === '0-1' && game.player_color === 'black') {
                        resClass = 'status-win';
                        resText = 'Победа 🏆';
                    } else if (rt === 'loss' || rt === '0-1' && game.player_color === 'white' || rt === '1-0' && game.player_color === 'black') {
                        resClass = 'status-loss';
                        resText = 'Поражение 💀';
                    }

                    const dateText = game.created_at
                        ? new Date(game.created_at).toLocaleDateString()
                        : '—';

                    return `
                        <div class="glass-panel p-5 md:p-6 history-card flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">
                            <div class="flex flex-col md:flex-row md:flex-wrap md:items-center gap-4 md:gap-6 lg:gap-8 min-w-0 flex-1">
                                <div class="px-4 md:px-6 py-2 rounded-2xl font-black uppercase text-[10px] w-fit ${resClass}">
                                    ${resText}
                                </div>

                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase">Дата</p>
                                    <p class="font-bold text-slate-700">${dateText}</p>
                                </div>

                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase">Бот</p>
                                    <p class="font-bold text-slate-700 italic">Lvl: ${escapeHtml(game.difficulty ?? '—')}</p>
                                </div>

                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase">Игра</p>
                                    <p class="font-bold text-slate-700">#${escapeHtml(game.id)}</p>
                                </div>
                            </div>

                            <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                                <button
                                    onclick="downloadPGN(${game.id})"
                                    class="action-btn px-4 py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl text-slate-600 font-black text-[10px] uppercase transition-all w-full sm:w-auto"
                                    aria-label="Скачать PGN партии ${game.id}"
                                    type="button"
                                >
                                    PGN 📥
                                </button>
                                <button
                                    onclick="goToAnalysis(${game.id})"
                                    class="action-btn px-4 py-4 bg-blue-500 hover:bg-blue-600 rounded-2xl text-white font-black text-[10px] uppercase shadow-lg shadow-blue-200 transition-all w-full sm:w-auto"
                                    aria-label="Открыть разбор партии ${game.id}"
                                    type="button"
                                >
                                    Разбор 📊
                                </button>
                                <button
                                    onclick="askAI(${game.id})"
                                    class="action-btn px-4 py-4 bg-indigo-500 hover:bg-indigo-600 rounded-2xl text-white font-black text-[10px] uppercase shadow-lg shadow-indigo-200 transition-all w-full sm:w-auto"
                                    type="button"
                                >
                                    Спросить ИИ 🤖
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

                announce('История партий загружена');
            } catch (err) {
                console.error(err);
                renderErrorState(err?.message || 'Не удалось загрузить историю.');
                document.getElementById('total-games').innerText = '—';
                announce('Ошибка загрузки истории');
            }
        }

        function goToAnalysis(id) {
            window.location.href = `analysis.html?id=${id}`;
        }

        function askAI(gameId) {
            const prompt = `Проанализируй мою партию #${gameId} и скажи 3 главные ошибки.`;

            // сохраняем prompt чтобы chat.html его подхватил
            localStorage.setItem('chat_prefill', prompt);

            // можно сохранить контекст (очень важно для будущего)
            localStorage.setItem('chat_context', JSON.stringify({
                type: 'game_analysis',
                game_id: gameId
            }));

            window.location.href = 'chat.html';
        }

        async function downloadPGN(id) {
            try {
                showToast('Подготавливаю PGN...');
                const response = await window.roChessApi.fetchWithAuth(`games/${id}/pgn`, {
                    method: 'GET'
                });

                let pgnText = '';

                if (typeof response === 'string') {
                    pgnText = response;
                } else if (response.pgn) {
                    pgnText = response.pgn;
                } else {
                    pgnText = JSON.stringify(response, null, 2);
                }

                const blob = new Blob([pgnText], { type: 'application/x-chess-pgn;charset=utf-8' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = `game_${id}.pgn`;
                document.body.appendChild(a);
                a.click();
                a.remove();

                URL.revokeObjectURL(url);
                showToast('PGN скачан', 'success');
            } catch (err) {
                console.error('Ошибка скачивания PGN:', err);
                showToast('Ой, не удалось скачать PGN', 'error');
            }
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = 1;
            loadHistory(currentPage);
        }

        document.getElementById('prev-page').addEventListener('click', () => changePage(-1));
        document.getElementById('next-page').addEventListener('click', () => changePage(1));

        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');
        const sidebar = document.getElementById('sidebar');

        function openMobileMenu() {
            sidebar.classList.remove('-translate-x-full');
            mobileOverlay.classList.remove('hidden');
            mobileMenuBtn.setAttribute('aria-label', 'Закрыть меню');
        }

        function closeMobileMenu() {
            if (window.innerWidth < 1280) {
                sidebar.classList.add('-translate-x-full');
            }
            mobileOverlay.classList.add('hidden');
            mobileMenuBtn.setAttribute('aria-label', 'Открыть меню');
        }

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                if (sidebar.classList.contains('-translate-x-full')) {
                    openMobileMenu();
                } else {
                    closeMobileMenu();
                }
            });
        }

        if (mobileOverlay) {
            mobileOverlay.addEventListener('click', closeMobileMenu);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMobileMenu();
            }
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1280) {
                mobileOverlay?.classList.add('hidden');
                sidebar?.classList.remove('-translate-x-full');
            } else {
                sidebar?.classList.add('-translate-x-full');
            }
        });

        loadHistory();
    </script>
</body>
</html>
