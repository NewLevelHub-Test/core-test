<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>История сражений - Ro-Chess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); min-height: 100vh; }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 32px; border: 2px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        
        .history-card {
            transition: all 0.2s ease;
            border-bottom: 6px solid #f1f5f9;
        }
        .history-card:hover { transform: translateY(-4px); border-bottom-color: #3b82f6; }
        
        .status-win { color: #10b981; background: #ecfdf5; }
        .status-loss { color: #ef4444; background: #fef2f2; }
        .status-draw { color: #64748b; background: #f1f5f9; }
    </style>
</head>
<body class="flex">

    <aside class="w-72 h-screen sticky top-0 flex flex-col p-8 border-r-2 border-white bg-white/50 z-50">
        <div class="mb-12 text-center">
            <div class="bg-[#00b06f] text-white roblox-font italic uppercase text-2xl px-4 py-2 rounded-xl shadow-lg transform -rotate-2">RO-CHESS</div>
        </div>
        <nav class="space-y-4">
            <a href="Dashboard.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">🏠 Дом</a>
            <a href="wbots.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">⚔️ Баттл</a>
            <a href="hist.html" class="flex items-center gap-4 p-4 bg-blue-50 rounded-2xl text-blue-600 font-black uppercase text-xs tracking-widest border-b-4 border-blue-100">📜 История</a>
        </nav>
    </aside>

    <main class="flex-1 p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="roblox-font italic uppercase text-4xl text-slate-800">Твои Сражения 📜</h1>
                <p class="text-slate-400 font-black uppercase text-[10px] tracking-[0.2em] mt-2">Архив всех шахматных битв</p>
            </div>
            <div class="glass-panel px-8 py-4 text-center">
                <p class="text-[10px] font-black text-slate-400 uppercase">Всего игр</p>
                <p id="total-games" class="text-2xl font-black text-indigo-600">0</p>
            </div>
        </header>

        <div id="history-grid" class="space-y-6 max-w-5xl">
            <div class="animate-pulse flex flex-col gap-4">
                <div class="h-24 bg-slate-200 rounded-3xl w-full"></div>
                <div class="h-24 bg-slate-200 rounded-3xl w-full"></div>
            </div>
        </div>

        <div class="flex justify-center gap-4 mt-12">
            <button id="prev-page" onclick="changePage(-1)" class="p-4 bg-white rounded-2xl font-black text-xs uppercase border-b-4 border-slate-200 disabled:opacity-30">Назад</button>
            <span id="page-info" class="flex items-center font-black text-slate-400 uppercase text-xs">Страница 1</span>
            <button id="next-page" onclick="changePage(1)" class="p-4 bg-white rounded-2xl font-black text-xs uppercase border-b-4 border-slate-200 disabled:opacity-30">Вперед</button>
        </div>
    </main>

    <script src="api.js"></script>
    <script>
        let currentPage = 1;
        const limit = 10;

        async function loadHistory(page = 1) {
            const grid = document.getElementById('history-grid');
            try {
                const data = await window.roChessApi.fetchWithAuth(`games/history?page=${page}&limit=${limit}`);
                const games = data.games || data;
                
                document.getElementById('total-games').innerText = data.total || games.length;
                document.getElementById('page-info').innerText = `Страница ${page}`;
                
                if (games.length === 0) {
                    grid.innerHTML = '<p class="text-center p-20 font-black text-slate-300 uppercase">Тут пока пусто... Время начать баттл! ⚔️</p>';
                    return;
                }

                grid.innerHTML = '';
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = "glass-panel p-6 history-card flex items-center justify-between";
                    
                    let resClass = "status-draw";
                    let resText = "Ничья";
                    if (game.result === 'win') { resClass = "status-win"; resText = "Победа 🏆"; }
                    if (game.result === 'loss') { resClass = "status-loss"; resText = "Поражение 💀"; }

                    card.innerHTML = `
                        <div class="flex items-center gap-8">
                            <div class="px-6 py-2 rounded-2xl font-black uppercase text-[10px] ${resClass}">${resText}</div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase">Дата</p>
                                <p class="font-bold text-slate-700">${new Date(game.created_at).toLocaleDateString()}</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase">Бот</p>
                                <p class="font-bold text-slate-700 italic">Lvl: ${game.difficulty}</p>
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="downloadPGN(${game.id})" class="p-4 bg-slate-100 hover:bg-slate-200 rounded-2xl text-slate-600 font-black text-[10px] uppercase transition-all">PGN 📥</button>
                            <button onclick="goToAnalysis(${game.id})" class="p-4 bg-blue-500 hover:bg-blue-600 rounded-2xl text-white font-black text-[10px] uppercase shadow-lg shadow-blue-200 transition-all">Разбор 📊</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                grid.innerHTML = '<p class="text-red-500">Ошибка загрузки истории ❌</p>';
            }
        }

        function goToAnalysis(id) {
            window.location.href = `analysis.html?id=${id}`;
        }

        async function downloadPGN(id) {
            try {
                const blob = await window.roChessApi.fetchWithAuth(`games/${id}/pgn`, { responseType: 'blob' });
                const url = `${window.roChessApi.BASE_URL}/games/${id}/pgn`;
                window.open(url, '_blank');
            } catch (err) { console.error(err); }
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = 1;
            loadHistory(currentPage);
        }

        loadHistory();
    </script>
</body>
</html>
