<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Chess - Desktop Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); 
            min-height: 100vh;
        }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        
        .desktop-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 2px solid white;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        .luxury-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px);
            border-radius: 32px; 
            border: 2px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 8px 0 #e2e8f0;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .luxury-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 8px 0 #e2e8f0; }

        .quest-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.25), 0 10px 0 #1d4ed8;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(-3deg); }
        }
        .floating { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="flex">

    <aside class="w-72 desktop-sidebar h-screen sticky top-0 flex flex-col p-8 z-50">
        <div class="mb-12 text-center">
            <div class="bg-[#00b06f] text-white roblox-font italic uppercase text-2xl px-4 py-2 rounded-xl shadow-lg border-t-2 border-white/30 inline-block transform -rotate-2">
                RO-CHESS
            </div>
        </div>

        <nav class="space-y-4 flex-1">
            <a href="Dashboard.html" class="flex items-center gap-4 p-4 bg-indigo-50 rounded-2xl text-indigo-600 font-black uppercase text-xs tracking-widest border-b-4 border-indigo-100">
                <span class="text-2xl">🏠</span> Дом
            </a>
            <a href="profile.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">👤</span> Профиль
            </a>
            <a href="study.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">📖</span> Уроки
            </a>
            <a href="admin.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">⚙️</span> Админ
            </a>
        </nav>

        <a href="profile.html" class="mt-auto flex items-center gap-3 p-4 bg-white rounded-3xl border-2 border-slate-50 shadow-sm hover:scale-105 transition-transform">
            <div class="w-10 h-10 bg-sky-400 rounded-xl flex items-center justify-center text-xl shadow-md">😎</div>
            <div class="leading-none">
                <p id="sidebar-user-name" class="font-black text-[10px] text-slate-800 uppercase tracking-tighter">Загрузка...</p>
                <p class="text-[9px] text-emerald-500 font-bold uppercase mt-1">LVL 5 ⭐</p>
            </div>
        </a>
    </aside>

    <main class="flex-1 p-12 max-w-[1200px] mx-auto space-y-10">

        <div class="grid grid-cols-3 gap-8 items-stretch">
            <section class="col-span-2 quest-gradient rounded-[3rem] p-10 relative overflow-hidden text-white border-2 border-white/20 flex flex-col justify-center">
                <div class="relative z-10 max-w-md">
                    <span class="bg-white/20 backdrop-blur-md text-[10px] font-black px-4 py-2 rounded-full uppercase mb-4 inline-block border border-white/30 tracking-widest">Цель Дня</span>
                    <h3 id="daily-goal-text" class="text-5xl font-black roblox-font italic uppercase mb-6 leading-[0.9] tracking-tighter">
                        Загрузка цели...
                    </h3>
                    <a href="study.html" class="inline-block bg-white text-blue-600 font-black px-10 py-4 rounded-[1.5rem] shadow-[0_8px_0_#e2e8f0] uppercase italic text-sm active:translate-y-2 active:shadow-none transition-all">Начать Урок 🚀</a>
                </div>
                <div class="absolute -right-10 -bottom-10 text-[18rem] opacity-20 floating">🐴</div>
            </section>

            <section class="luxury-card p-8 flex flex-col justify-center text-center">
                <span class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Сезонный пропуск</span>
                <div class="relative w-32 h-32 mx-auto mb-4">
                    <svg class="w-full h-full transform -rotate-90">
                        <circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="12" fill="transparent" class="text-slate-100" />
                        <circle id="roadmap-svg-circle" cx="64" cy="64" r="58" stroke="currentColor" stroke-width="12" fill="transparent" class="text-emerald-400 transition-all duration-1000" stroke-dasharray="364.4" stroke-dashoffset="364.4" stroke-linecap="round" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="roadmap-percent" class="text-3xl font-black text-slate-800">0%</span>
                        <span class="text-[8px] font-black text-slate-400 uppercase">Опыт</span>
                    </div>
                </div>
                <p id="xp-left-text" class="text-[10px] font-bold text-slate-400 uppercase italic">До нового ранга: ...</p>
            </section>
        </div>

        <div class="grid grid-cols-4 gap-6">
            <a href="test.html" class="luxury-card p-8 flex flex-col items-center gap-4">
                <div class="w-20 h-20 bg-orange-100 rounded-[2rem] flex items-center justify-center text-5xl shadow-inner">📝</div>
                <span class="text-slate-700 font-black text-xs uppercase tracking-widest">Испытания</span>
            </a>
            <a href="study.html" class="luxury-card p-8 flex flex-col items-center gap-4">
                <div class="w-20 h-20 bg-blue-100 rounded-[2rem] flex items-center justify-center text-5xl shadow-inner">📖</div>
                <span class="text-slate-700 font-black text-xs uppercase tracking-widest">Уроки</span>
            </a>
            <a href="wbots.html" class="luxury-card p-8 flex flex-col items-center gap-4">
                <div class="w-20 h-20 bg-indigo-100 rounded-[2rem] flex items-center justify-center text-5xl shadow-inner">⚔️</div>
                <span class="text-slate-700 font-black text-xs uppercase tracking-widest">Играть</span>
            </a>
            <a href="hist.html" class="luxury-card p-8 flex flex-col items-center gap-4">
                <div class="w-20 h-20 bg-purple-100 rounded-[2rem] flex items-center justify-center text-5xl shadow-inner">📜</div>
                <span class="text-slate-700 font-black text-xs uppercase tracking-widest">История</span>
            </a>
        </div>

        <section class="luxury-card p-10 bg-indigo-50/20 border-dashed border-4 border-indigo-100">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h3 class="text-indigo-500 font-black text-xl uppercase tracking-widest">Дорожная карта</h3>
                    <p id="roadmap-subtitle" class="text-slate-400 text-sm mt-2">Загрузка плана...</p>
                </div>
                <div class="text-right">
                    <div id="roadmap-mini-progress" class="text-2xl font-black text-emerald-500">0%</div>
                    <div class="text-[10px] uppercase font-black text-slate-400 tracking-widest">Прогресс</div>
                </div>
            </div>
        
            <div class="mb-10 overflow-x-auto pb-4">
                <div id="roadmap-timeline" class="flex items-center gap-6 min-w-max">
                </div>
            </div>
        
            <div id="current-week-card" class="bg-white/80 rounded-[2rem] border-2 border-white shadow-[0_10px_25px_rgba(0,0,0,0.04)] p-8">
                <div class="flex items-start justify-between gap-6 mb-6">
                    <div>
                        <h4 id="current-week-title" class="text-2xl font-black text-slate-800">Текущая неделя</h4>
                        <p id="current-week-description" class="text-slate-500 mt-2">Загрузка...</p>
                    </div>
                    <div id="current-week-badge" class="px-4 py-2 rounded-2xl bg-indigo-100 text-indigo-600 text-xs font-black uppercase tracking-widest">
                        Неделя
                    </div>
                </div>
        
                <div id="daily-tasks-list" class="grid md:grid-cols-2 gap-4">
                </div>
            </div>
        </section>
    </main>

    <script src="state.js"></script>
<script src="api.js"></script>

<script>
    if (!window.roChessApi.isAuthenticated()) {
        window.location.href = 'h1.html';
    }

    function escapeHtml(text) {
        if (text == null) return '';
        return String(text)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function getTaskTypeEmoji(type) {
        switch (type) {
            case 'lesson': return '📘';
            case 'exercise': return '🧩';
            case 'game': return '♟️';
            case 'test': return '📝';
            default: return '⭐';
        }
    }

    async function initDashboard() {
        try {
            const data = await window.roChessApi.getDashboardData();
            console.log("Dashboard data:", data);

            const sidebarName = document.getElementById('sidebar-user-name');
            if (sidebarName && data.user) {
                sidebarName.textContent = data.user.username || data.user.name || 'Игрок';
            }

            const goalText = document.getElementById('daily-goal-text');
            if (goalText) {
                goalText.textContent =
                    (data.recommendation && data.recommendation.description)
                    ? data.recommendation.description
                    : 'Готов к новым победам?';
            }

            const roadmapCircle = document.getElementById('roadmap-svg-circle');
            const progressPercent = document.getElementById('roadmap-percent');
            const horizontalBar = document.getElementById('roadmap-horizontal-bar');

            const percentage = data?.roadmap_widget?.completed_percentage || 0;

            if (progressPercent) {
                progressPercent.textContent = `${percentage}%`;
            }

            if (roadmapCircle) {
                const radius = 58;
                const circumference = 2 * Math.PI * radius;
                roadmapCircle.style.strokeDasharray = `${circumference} ${circumference}`;
                const offset = circumference - (percentage / 100) * circumference;
                roadmapCircle.style.strokeDashoffset = offset;
            }

            if (horizontalBar) {
                setTimeout(() => {
                    horizontalBar.style.width = `${percentage}%`;
                }, 300);
            }

        } catch (error) {
            console.error("Ошибка Dashboard:", error);
            if (String(error.message).includes('401')) {
                window.location.href = 'h1.html';
            }
        }
    }

    async function loadRoadmap() {
        try {
            const data = await window.roChessApi.getRoadmap();
            console.log("Roadmap:", data);

            const roadmap = data.roadmap || {};
            const weeks = Array.isArray(data.weeks) ? data.weeks : [];

            renderRoadmapTimeline(roadmap, weeks);
            renderCurrentWeek(roadmap, weeks);

        } catch (error) {
            console.error("Ошибка загрузки roadmap:", error);

            const subtitle = document.getElementById('roadmap-subtitle');
            const timeline = document.getElementById('roadmap-timeline');
            const title = document.getElementById('current-week-title');
            const desc = document.getElementById('current-week-description');
            const badge = document.getElementById('current-week-badge');
            const list = document.getElementById('daily-tasks-list');
            const miniProgress = document.getElementById('roadmap-mini-progress');

            if (subtitle) subtitle.textContent = 'План обучения пока не создан';
            if (miniProgress) miniProgress.textContent = '0%';
            if (timeline) timeline.innerHTML = '';
            if (title) title.textContent = 'Дорожная карта недоступна';
            if (desc) desc.textContent = error.message || 'Не удалось загрузить roadmap';
            if (badge) badge.textContent = 'Неделя';

            const canGenerate =
                String(error.message || '').toLowerCase().includes('план обучения не создан') &&
                typeof window.roChessApi.generateRoadmap === 'function';

            if (list) {
                list.innerHTML = `
                    <div class="col-span-full bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl p-6">
                        <div class="text-slate-500 font-bold mb-4">
                            Пока нет дорожной карты. Сначала нужно сгенерировать её на сервере.
                        </div>
                        ${canGenerate ? `
                            <button
                                id="generate-roadmap-btn"
                                class="px-6 py-3 rounded-2xl bg-indigo-500 text-white font-black uppercase tracking-wider hover:bg-indigo-600 transition"
                            >
                                Создать дорожную карту
                            </button>
                        ` : ''}
                    </div>
                `;

                if (canGenerate) {
                    const btn = document.getElementById('generate-roadmap-btn');
                    if (btn) {
                        btn.addEventListener('click', async () => {
                            try {
                                btn.disabled = true;
                                btn.textContent = 'Создание...';

                                await window.roChessApi.generateRoadmap();
                                await loadRoadmap();
                                await initDashboard();

                            } catch (e) {
                                console.error('Ошибка генерации roadmap:', e);
                                alert(e.message || 'Не удалось создать дорожную карту');
                                btn.disabled = false;
                                btn.textContent = 'Создать дорожную карту';
                            }
                        });
                    }
                }
            }
        }
    }

    function renderRoadmapTimeline(roadmap, weeks) {
        const timeline = document.getElementById('roadmap-timeline');
        const subtitle = document.getElementById('roadmap-subtitle');
        const miniProgress = document.getElementById('roadmap-mini-progress');

        if (!timeline) return;

        const totalWeeks = roadmap?.total_weeks || weeks.length || 0;
        const currentWeekNumber = roadmap?.current_week || 1;
        const completedWeeks = weeks.filter(w => w.is_completed).length;

        const progressPercent = totalWeeks > 0
            ? Math.round((completedWeeks / totalWeeks) * 100)
            : 0;

        if (subtitle) {
            subtitle.textContent = `${roadmap?.title || 'План обучения'} • текущая неделя: ${currentWeekNumber}`;
        }

        if (miniProgress) {
            miniProgress.textContent = `${progressPercent}%`;
        }

        if (!weeks.length) {
            timeline.innerHTML = '';
            return;
        }

        timeline.innerHTML = weeks.map((week) => {
            const isCurrent = week.week_number === currentWeekNumber;
            const isDone = !!week.is_completed;

            let cardClass = 'bg-white text-slate-500 border-slate-200 shadow-[0_6px_0_#e2e8f0]';
            let icon = '🔒';

            if (isDone) {
                cardClass = 'bg-emerald-500 text-white border-white shadow-[0_8px_0_#059669]';
                icon = '✅';
            } else if (isCurrent) {
                cardClass = 'bg-indigo-500 text-white border-white shadow-[0_10px_0_#2563eb] scale-105';
                icon = '🚀';
            }

            return `
                <div class="flex flex-col items-center gap-3">
                    <div class="w-20 h-20 rounded-[2rem] border-4 ${cardClass} flex items-center justify-center text-3xl font-black transition-all">
                        ${icon}
                    </div>
                    <div class="text-center max-w-[120px]">
                        <div class="text-[10px] uppercase font-black tracking-widest text-slate-400">
                            Неделя ${week.week_number}
                        </div>
                        <div class="text-xs font-black ${isCurrent ? 'text-indigo-500' : isDone ? 'text-emerald-500' : 'text-slate-500'} mt-1">
                            ${escapeHtml(week.title || `Неделя ${week.week_number}`)}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderCurrentWeek(roadmap, weeks) {
        const currentWeekNumber = roadmap?.current_week || 1;
        let currentWeek = weeks.find(w => w.week_number === currentWeekNumber);

        if (!currentWeek && weeks.length > 0) {
            currentWeek = weeks[0];
        }

        const titleEl = document.getElementById('current-week-title');
        const descEl = document.getElementById('current-week-description');
        const badgeEl = document.getElementById('current-week-badge');
        const listEl = document.getElementById('daily-tasks-list');

        if (!currentWeek) {
            if (titleEl) titleEl.textContent = 'Нет недель';
            if (descEl) descEl.textContent = 'Roadmap пустой';
            if (badgeEl) badgeEl.textContent = 'Неделя';
            if (listEl) listEl.innerHTML = '';
            return;
        }

        if (titleEl) {
            titleEl.textContent = currentWeek.title || `Неделя ${currentWeek.week_number}`;
        }

        if (descEl) {
            descEl.textContent = currentWeek.description || 'Описание отсутствует';
        }

        if (badgeEl) {
            badgeEl.textContent = `Неделя ${currentWeek.week_number}`;
        }

        const tasks = Array.isArray(currentWeek.daily_tasks) ? currentWeek.daily_tasks : [];

        if (!tasks.length) {
            listEl.innerHTML = `
                <div class="col-span-full bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 p-6 text-slate-500 font-bold">
                    На этой неделе пока нет заданий.
                </div>
            `;
            return;
        }

        listEl.innerHTML = tasks.map(task => {
            const done = !!task.is_completed;

            return `
                <label class="flex items-start gap-4 p-5 rounded-[1.5rem] border-2 transition-all cursor-pointer ${done ? 'bg-emerald-50 border-emerald-200' : 'bg-slate-50 border-slate-200 hover:border-indigo-200 hover:bg-indigo-50/40'}">
                    <input
                        type="checkbox"
                        class="task-checkbox mt-1 w-5 h-5 accent-emerald-500 cursor-pointer"
                        data-task-id="${task.id}"
                        ${done ? 'checked disabled' : ''}
                    />
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xl">${getTaskTypeEmoji(task.task_type)}</span>
                            <span class="text-[10px] uppercase font-black tracking-widest ${done ? 'text-emerald-500' : 'text-slate-400'}">
                                День ${task.day_number || '-'} • ${escapeHtml(task.task_type || 'task')}
                            </span>
                        </div>

                        <div class="font-black text-sm ${done ? 'text-emerald-700 line-through' : 'text-slate-800'}">
                            ${escapeHtml(task.title || 'Без названия')}
                        </div>

                        <div class="text-sm mt-1 ${done ? 'text-emerald-600' : 'text-slate-500'}">
                            ${escapeHtml(task.description || '')}
                        </div>
                    </div>
                </label>
            `;
        }).join('');

        bindTaskCheckboxes();
    }

    function bindTaskCheckboxes() {
        const checkboxes = document.querySelectorAll('.task-checkbox');

        checkboxes.forEach((checkbox) => {
            checkbox.addEventListener('click', async function () {
                const taskId = this.dataset.taskId;
                if (!taskId || this.disabled) return;

                this.disabled = true;

                try {
                    await window.roChessApi.completeRoadmapTask(taskId);
                    await loadRoadmap();
                    await initDashboard();
                } catch (error) {
                    console.error('Ошибка завершения задачи:', error);
                    alert(error.message || 'Не удалось отметить задачу как выполненную');
                    this.disabled = false;
                    this.checked = false;
                }
            });
        });
    }

    async function initPage() {
        await initDashboard();
        await loadRoadmap();
    }

    initPage();
</script>
</body>
</html>
