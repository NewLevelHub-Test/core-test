<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Legends — Результат теста</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .roblox-font {
            font-family: 'Montserrat', sans-serif;
        }

        .luxury-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid white;
            border-radius: 48px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05), 0 15px 0 #e2e8f0;
            width: 100%;
            max-width: 560px;
            animation: fadeInUp 0.22s ease;
        }

        .score-circle {
            background: conic-gradient(#3b82f6 var(--p), #f1f5f9 0);
            border-radius: 50%;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 0 auto;
            transition: all 0.8s ease;
        }

        .score-circle::before {
            content: "";
            position: absolute;
            inset: 15px;
            background: white;
            border-radius: 50%;
            box-shadow: inset 0 2px 10px rgba(148,163,184,0.08);
        }

        .btn-action {
            background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 10px 0 #1d4ed8, 0 20px 40px rgba(59, 130, 246, 0.3);
            transition: all 0.15s ease;
            min-height: 56px;
        }

        .btn-action:hover {
            transform: translateY(-2px);
        }

        .btn-action:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #1d4ed8;
        }

        .skeleton {
            position: relative;
            overflow: hidden;
            background: #e2e8f0;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.6) 50%,
                rgba(255,255,255,0) 100%
            );
            animation: shimmer 1.25s infinite;
        }

        .inline-message {
            border-radius: 20px;
            padding: 14px 16px;
            font-weight: 800;
            font-size: 0.95rem;
            animation: fadeInUp 0.22s ease;
        }

        .inline-message.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 2px solid #fecaca;
        }

        .inline-message.success {
            background: #ecfdf5;
            color: #047857;
            border: 2px solid #a7f3d0;
        }

        .inline-message.info {
            background: #eff6ff;
            color: #1d4ed8;
            border: 2px solid #bfdbfe;
        }

        .empty-state {
            background: rgba(248,250,252,0.92);
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            color: #64748b;
            font-weight: 800;
            animation: fadeInUp 0.22s ease;
        }

        .error-state {
            background: linear-gradient(180deg, rgba(254,242,242,0.95), rgba(255,255,255,0.98));
            border: 2px solid #fecaca;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            color: #991b1b;
            font-weight: 800;
            animation: fadeInUp 0.22s ease;
        }

        .stats-card {
            background: #f8fafc;
            border: 2px solid white;
            border-radius: 24px;
            border-bottom: 6px solid #e2e8f0;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 120;
            background: rgba(15, 23, 42, 0.94);
            color: white;
            border-radius: 18px;
            padding: 14px 18px;
            font-weight: 800;
            box-shadow: 0 14px 30px rgba(0,0,0,0.18);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            max-width: calc(100vw - 32px);
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        .focus-ring:focus-visible,
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible,
        [tabindex]:focus-visible {
            outline: 3px solid #60a5fa;
            outline-offset: 3px;
        }

        .fade-swap {
            animation: fadeIn 0.2s ease;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .luxury-card {
                border-radius: 28px;
                box-shadow: 0 18px 36px rgba(0,0,0,0.06), 0 10px 0 #e2e8f0;
            }

            .score-circle {
                width: 150px;
                height: 150px;
            }

            .score-circle::before {
                inset: 13px;
            }

            .empty-state,
            .error-state,
            .inline-message,
            .stats-card {
                border-radius: 20px;
            }
        }
    </style>
</head>
<body class="p-4 sm:p-6">
    <div id="live-region" class="sr-only" aria-live="polite"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div class="luxury-card p-6 sm:p-8 md:p-12 text-center relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-50 rounded-full blur-3xl"></div>

        <div id="page-message" class="hidden mb-6" aria-live="polite"></div>

        <h1 class="roblox-font italic uppercase text-slate-800 text-2xl sm:text-3xl mb-8 sm:mb-10 tracking-tighter">
            Испытание завершено! 🏆
        </h1>

        <div class="score-circle mb-8" id="circle" style="--p: 0%" aria-label="Процент правильных ответов">
            <div class="relative z-10">
                <span id="score-percent" class="text-4xl sm:text-5xl font-black text-slate-800">0%</span>
            </div>
        </div>

        <div class="space-y-2 mb-8">
            <p class="text-slate-400 font-black uppercase text-[10px] sm:text-xs tracking-[0.3em]">Твой уровень</p>
            <div id="user-level" class="text-2xl sm:text-3xl font-black text-blue-500 roblox-font italic uppercase tracking-tighter">
                Загрузка...
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8" aria-live="polite">
            <div class="stats-card p-4 sm:p-5">
                <div class="text-[10px] uppercase font-black tracking-widest text-slate-400 mb-2">Верно</div>
                <div id="correct-count" class="text-2xl font-black text-emerald-500">—</div>
            </div>
            <div class="stats-card p-4 sm:p-5">
                <div class="text-[10px] uppercase font-black tracking-widest text-slate-400 mb-2">Ошибки</div>
                <div id="errors-count" class="text-2xl font-black text-rose-500">—</div>
            </div>
        </div>

        <div class="bg-slate-50 rounded-[2rem] sm:rounded-[2.5rem] p-5 sm:p-8 text-left mb-10 border-b-4 border-slate-100">
            <h3 class="font-black text-[10px] uppercase text-slate-400 tracking-widest mb-4 flex items-center gap-2">
                <span>⚠️</span> Слабые темы
            </h3>
            <div id="weak-topics-wrapper" aria-live="polite">
                <ul id="weak-topics" class="space-y-3"></ul>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <a href="study.html" class="btn-action text-white font-black py-5 sm:py-6 rounded-3xl uppercase italic roblox-font tracking-widest text-lg sm:text-xl inline-flex items-center justify-center focus-ring" aria-label="Начать обучение">
                Начать обучение 🚀
            </a>
            <a href="Dashboard.html" class="text-slate-400 font-black uppercase text-[10px] tracking-widest hover:text-slate-600 transition-colors min-h-[48px] inline-flex items-center justify-center focus-ring" aria-label="Вернуться домой">
                Вернуться домой
            </a>
        </div>
    </div>

    <script>
        const liveRegion = document.getElementById('live-region');
        const toast = document.getElementById('toast');
        const pageMessage = document.getElementById('page-message');
        let toastTimer = null;

        function announce(message) {
            if (liveRegion) liveRegion.textContent = message;
        }

        function showToast(message, type = 'default') {
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.className = 'toast show';

            if (type === 'error') {
                toast.style.background = 'rgba(127, 29, 29, 0.96)';
            } else if (type === 'success') {
                toast.style.background = 'rgba(6, 78, 59, 0.96)';
            } else {
                toast.style.background = 'rgba(15, 23, 42, 0.94)';
            }

            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2400);
        }

        function showPageMessage(message, type = 'info') {
            pageMessage.className = `mb-6 inline-message ${type}`;
            pageMessage.textContent = message;
            pageMessage.classList.remove('hidden');
            announce(message);
        }

        function hidePageMessage() {
            pageMessage.classList.add('hidden');
            pageMessage.textContent = '';
        }

        function renderWeakTopicsLoading() {
            const list = document.getElementById('weak-topics');
            list.innerHTML = `
                <li class="h-5 rounded-xl skeleton"></li>
                <li class="h-5 rounded-xl skeleton"></li>
                <li class="h-5 rounded-xl skeleton"></li>
            `;
        }

        function renderWeakTopics(topics) {
            const list = document.getElementById('weak-topics');

            if (!Array.isArray(topics) || topics.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="text-3xl mb-3">✅</div>
                        <div class="text-emerald-600 font-black text-sm uppercase mb-2">Ошибок нет</div>
                        <div class="text-slate-500 font-bold">Отличный результат, слабых тем не найдено.</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = '';
            topics.forEach(topic => {
                const label =
                    typeof topic === 'string' || typeof topic === 'number'
                        ? `Тема ID: ${topic}`
                        : topic.name || topic.title || topic.topic || `Тема ID: ${topic.id ?? '—'}`;

                const li = document.createElement('li');
                li.className = "flex items-center gap-3 text-slate-600 font-black text-sm uppercase fade-swap";
                li.innerHTML = `<span class="text-rose-500">✕</span> ${label}`;
                list.appendChild(li);
            });
        }

        function renderErrorState(message) {
            document.getElementById('weak-topics-wrapper').innerHTML = `
                <div class="error-state">
                    <div class="text-4xl mb-3">😵</div>
                    <div class="text-lg font-black text-red-700 mb-2">Ой, что-то пошло не так!</div>
                    <div class="text-red-600 font-bold">${message}</div>
                </div>
            `;
        }

        function animateScore(percent) {
            const safePercent = Math.max(0, Math.min(100, Number(percent) || 0));
            const scoreEl = document.getElementById('score-percent');
            const circle = document.getElementById('circle');

            scoreEl.textContent = '0%';
            circle.style.setProperty('--p', '0%');

            let current = 0;
            const step = Math.max(1, Math.ceil(safePercent / 30));

            const timer = setInterval(() => {
                current += step;
                if (current >= safePercent) {
                    current = safePercent;
                    clearInterval(timer);
                }

                scoreEl.textContent = `${current}%`;
                circle.style.setProperty('--p', `${current}%`);
            }, 20);
        }

        function populateResult(result) {
            const percent = Number(result.percent || 0);
            const level = result.level || 'beginner';
            const weakTopics = result.weak_topics || [];
            const attempt = result.attempt || {};
            const total = Number(attempt.total_questions || 0);
            const score = Number(attempt.score || 0);
            const errors = Math.max(0, total - score);

            animateScore(percent);
            document.getElementById('user-level').textContent = level;
            document.getElementById('correct-count').textContent = total ? score : '—';
            document.getElementById('errors-count').textContent = total ? errors : '—';
            renderWeakTopics(weakTopics);

            if (percent >= 80) {
                showPageMessage('Отличный результат! Можно сразу переходить к обучению.', 'success');
                showToast('Сильный результат!', 'success');
            } else if (percent > 0) {
                showPageMessage('Тест завершён. Ниже показаны темы, которые стоит подтянуть.', 'info');
            } else {
                showPageMessage('Результат сохранён. Начни обучение, чтобы улучшить его.', 'info');
            }
        }

        function initPage() {
            renderWeakTopicsLoading();
            hidePageMessage();
            announce('Загружается результат испытания');

            try {
                const rawData = localStorage.getItem('last_result');
                console.log("Данные от бэкенда:", rawData);

                if (!rawData) {
                    renderErrorState('Не удалось найти результат теста. Пройди испытание ещё раз.');
                    document.getElementById('user-level').textContent = 'Нет данных';
                    document.getElementById('correct-count').textContent = '—';
                    document.getElementById('errors-count').textContent = '—';
                    showPageMessage('Ой, что-то пошло не так! Результат теста не найден.', 'error');
                    showToast('Результат не найден', 'error');
                    return;
                }

                const result = JSON.parse(rawData);
                populateResult(result);
                announce('Результат испытания загружен');
            } catch (error) {
                console.error('Ошибка чтения результата:', error);
                renderErrorState('Не удалось прочитать результат теста.');
                document.getElementById('user-level').textContent = 'Ошибка';
                document.getElementById('correct-count').textContent = '—';
                document.getElementById('errors-count').textContent = '—';
                showPageMessage('Ой, что-то пошло не так! Не удалось открыть результат.', 'error');
                showToast('Ошибка загрузки результата', 'error');
            }
        }

        initPage();
    </script>
</body>
</html>
