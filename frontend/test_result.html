<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результат испытания - Ro-Chess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        
        .luxury-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid white;
            border-radius: 48px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05), 0 15px 0 #e2e8f0;
            width: 100%;
            max-width: 550px;
        }

        .score-circle {
            background: conic-gradient(#3b82f6 var(--p), #f1f5f9 0);
            border-radius: 50%;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 0 auto;
        }
        .score-circle::before {
            content: "";
            position: absolute;
            inset: 15px;
            background: white;
            border-radius: 50%;
        }

        .btn-action {
            background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 10px 0 #1d4ed8, 0 20px 40px rgba(59, 130, 246, 0.3);
            transition: all 0.1s;
        }
        .btn-action:active { transform: translateY(8px); box-shadow: 0 2px 0 #1d4ed8; }
    </style>
</head>
<body class="p-6">

    <div class="luxury-card p-12 text-center relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-50 rounded-full blur-3xl"></div>
        
        <h1 class="roblox-font italic uppercase text-slate-800 text-3xl mb-10 tracking-tighter">Испытание завершено! 🏆</h1>

        <div class="score-circle mb-8" id="circle" style="--p: 0%">
            <div class="relative z-10">
                <span id="score-percent" class="text-5xl font-black text-slate-800">0%</span>
            </div>
        </div>

        <div class="space-y-2 mb-10">
            <p class="text-slate-400 font-black uppercase text-xs tracking-[0.3em]">Твой уровень</p>
            <div id="user-level" class="text-3xl font-black text-blue-500 roblox-font italic uppercase tracking-tighter">
                Загрузка...
            </div>
        </div>

        <div class="bg-slate-50 rounded-[2.5rem] p-8 text-left mb-10 border-b-4 border-slate-100">
            <h3 class="font-black text-[10px] uppercase text-slate-400 tracking-widest mb-4 flex items-center gap-2">
                <span>⚠️</span> Слабые темы
            </h3>
            <ul id="weak-topics" class="space-y-3">
                </ul>
        </div>

        <div class="flex flex-col gap-4">
            <a href="study.html" class="btn-action text-white font-black py-6 rounded-3xl uppercase italic roblox-font tracking-widest text-xl">
                Начать обучение 🚀
            </a>
            <a href="Dashboard.html" class="text-slate-400 font-black uppercase text-[10px] tracking-widest hover:text-slate-600 transition-colors">
                Вернуться домой
            </a>
        </div>
    </div>

    <script>
        const rawData = localStorage.getItem('last_result');
        console.log("Данные от бэкенда:", rawData); 
    
        if (rawData) {
            const result = JSON.parse(rawData);
            
            const percent = result.percent || 0;
            document.getElementById('score-percent').textContent = percent + '%';
            
            const circle = document.getElementById('circle');
            if (circle) circle.style.setProperty('--p', percent + '%');
    
            document.getElementById('user-level').textContent = result.level || 'beginner';
    
            if (result.attempt) {
                const total = result.attempt.total_questions || 0;
                const score = result.attempt.score || 0;
                if (document.getElementById('errors-count')) {
                    document.getElementById('errors-count').textContent = total - score;
                }
                if (document.getElementById('correct-count')) {
                    document.getElementById('correct-count').textContent = score;
                }
            }
    
            const list = document.getElementById('weak-topics');
            const topics = result.weak_topics || [];
            
            if (topics.length === 0) {
                list.innerHTML = `<li class="text-emerald-500 font-black text-sm uppercase">✅ Ошибок нет, ты профи!</li>`;
            } else {
                list.innerHTML = '';
                topics.forEach(topicId => {
                    const li = document.createElement('li');
                    li.className = "flex items-center gap-3 text-slate-600 font-black text-sm uppercase";
                    li.innerHTML = `<span class="text-rose-500">✕</span> Тема ID: ${topicId}`;
                    list.appendChild(li);
                });
            }
        }
    </script>

</body>
</html>
