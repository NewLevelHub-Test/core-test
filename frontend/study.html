<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Legends — Академия</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%);
            min-height: 100vh;
        }

        .roblox-font {
            font-family: 'Montserrat', sans-serif;
        }

        .desktop-sidebar {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            border-right: 2px solid white;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        .topic-card {
            background: white;
            border-radius: 32px;
            border: 2px solid white;
            box-shadow: 0 10px 0 #e2e8f0;
            transition: all 0.2s ease;
            cursor: pointer;
            min-height: 180px;
        }

        .topic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #3b82f6;
            border-color: #3b82f6;
        }

        .chess-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: min(92vw, 500px);
            height: min(92vw, 500px);
            min-width: 240px;
            min-height: 240px;
            border: 12px solid #393b3d;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1), 0 15px 0 #d1d5db;
            user-select: none;
            background: white;
        }

        .sq-l { background-color: #ffffff; }
        .sq-d { background-color: #3b82f6; }

        .piece {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(22px, 4vw, 56px);
            width: 100%;
            height: 100%;
            line-height: 1;
        }

        .luxury-card {
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid white;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .board-square {
            position: relative;
            cursor: pointer;
            transition: transform 0.15s ease;
            min-height: 48px;
            min-width: 48px;
        }

        .board-square:hover {
            transform: scale(0.98);
        }

        .selected-square {
            box-shadow: inset 0 0 0 5px #f59e0b;
        }

        .target-square {
            box-shadow: inset 0 0 0 5px #22c55e;
        }

        .last-move-from {
            box-shadow: inset 0 0 0 4px #a855f7;
        }

        .last-move-to {
            box-shadow: inset 0 0 0 4px #ec4899;
        }

        .skeleton {
            position: relative;
            overflow: hidden;
            background: #e2e8f0;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.6) 50%,
                rgba(255,255,255,0) 100%
            );
            animation: shimmer 1.25s infinite;
        }

        .inline-message {
            border-radius: 20px;
            padding: 14px 16px;
            font-weight: 800;
            font-size: 0.95rem;
            animation: fadeInUp 0.22s ease;
        }

        .inline-message.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 2px solid #fecaca;
        }

        .inline-message.success {
            background: #ecfdf5;
            color: #047857;
            border: 2px solid #a7f3d0;
        }

        .inline-message.info {
            background: #eff6ff;
            color: #1d4ed8;
            border: 2px solid #bfdbfe;
        }

        .empty-state {
            background: rgba(248,250,252,0.92);
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            color: #64748b;
            font-weight: 800;
            animation: fadeInUp 0.22s ease;
        }

        .error-state {
            background: linear-gradient(180deg, rgba(254,242,242,0.95), rgba(255,255,255,0.98));
            border: 2px solid #fecaca;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            color: #991b1b;
            font-weight: 800;
            animation: fadeInUp 0.22s ease;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 999px;
            animation: spin 0.75s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 120;
            background: rgba(15, 23, 42, 0.94);
            color: white;
            border-radius: 18px;
            padding: 14px 18px;
            font-weight: 800;
            box-shadow: 0 14px 30px rgba(0,0,0,0.18);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            max-width: calc(100vw - 32px);
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        .focus-ring:focus-visible,
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible,
        [tabindex]:focus-visible {
            outline: 3px solid #60a5fa;
            outline-offset: 3px;
        }

        .fade-swap {
            animation: fadeIn 0.2s ease;
        }

        .page-transition {
            animation: fadeInUp 0.22s ease;
        }

        .btn-min {
            min-height: 48px;
            min-width: 48px;
        }

        .lesson-row {
            min-height: 72px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1279px) {
            .desktop-sidebar {
                box-shadow: 20px 0 40px rgba(0,0,0,0.12);
            }
        }

        @media (max-width: 1024px) {
            .topic-card,
            .luxury-card {
                border-radius: 24px;
            }

            .chess-grid {
                width: min(84vw, 460px);
                height: min(84vw, 460px);
                border-width: 10px;
                border-radius: 24px;
            }
        }

        @media (max-width: 640px) {
            .topic-card,
            .luxury-card {
                border-radius: 22px;
            }

            .chess-grid {
                width: min(94vw, 360px);
                height: min(94vw, 360px);
                min-width: 220px;
                min-height: 220px;
                border-width: 8px;
                border-radius: 20px;
            }

            .piece {
                font-size: clamp(18px, 5vw, 34px);
            }

            .inline-message,
            .empty-state,
            .error-state {
                border-radius: 18px;
            }
        }
    </style>
</head>
<body class="bg-slate-50 xl:flex">
    <div id="live-region" class="sr-only" aria-live="polite"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- MOBILE HEADER -->
    <header class="xl:hidden sticky top-0 z-[90] bg-white/90 backdrop-blur-xl border-b border-slate-100 px-4 py-3 flex items-center justify-between">
        <img src="gml.png" alt="GM Legends" class="h-10 rounded-xl">

        <button id="mobile-menu-btn" class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center text-2xl btn-min" aria-label="Открыть меню" type="button">
            ☰
        </button>
    </header>

    <div id="mobile-overlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-[80] xl:hidden"></div>

    <aside id="sidebar" class="w-72 desktop-sidebar h-screen fixed xl:sticky top-0 left-0 flex flex-col p-8 z-[85] -translate-x-full xl:translate-x-0 transition-transform duration-300">
        <div class="mb-12 text-center">
            <img src="gml.png" alt="GM Legends" class="h-14 rounded-xl inline-block">
        </div>

        <nav class="space-y-4 flex-1" aria-label="Основная навигация">
            <a href="Dashboard.html" class="flex items-center gap-4 p-4 min-h-[52px] hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all" aria-label="Перейти на главную">
                <span>🏠</span> Дом
            </a>

            <a href="study.html" class="flex items-center gap-4 p-4 min-h-[52px] bg-indigo-50 rounded-2xl text-indigo-600 font-black uppercase text-xs tracking-widest border-b-4 border-indigo-100" aria-label="Текущая страница: обучение">
                <span>🎓</span> Обучение
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-6 xl:p-12 max-w-[1400px] mx-auto w-full">
        <div id="page-message" class="hidden mb-5" aria-live="polite"></div>

        <section id="topics-section">
            <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8 md:mb-10">
                <h1 class="roblox-font italic uppercase text-slate-800 text-2xl md:text-3xl">
                    Академия Гроссмейстеров 🎓
                </h1>
            </div>

            <div id="topics-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 md:gap-6 xl:gap-8" aria-live="polite"></div>
        </section>

        <section id="lessons-section" class="hidden">
            <button onclick="goBack()" class="text-indigo-500 font-black uppercase text-xs mb-6 min-h-[48px]" aria-label="Назад к темам" type="button">← Назад к темам</button>
            <h2 id="current-topic-title" class="roblox-font italic uppercase text-xl md:text-2xl mb-6 md:mb-8 text-slate-800">
                Уроки
            </h2>
            <div id="lessons-grid" class="max-w-3xl space-y-4" aria-live="polite"></div>
        </section>

        <section id="content-section" class="hidden flex flex-col items-center">
            <div class="w-full max-w-6xl flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6 md:mb-8">
                <button onclick="goBack()" class="text-slate-400 font-black uppercase text-xs tracking-widest w-fit min-h-[48px]" aria-label="К списку уроков" type="button">
                    ← К списку уроков
                </button>
                <h2 id="lesson-title" class="roblox-font italic uppercase text-slate-800 text-lg md:text-xl tracking-tighter">
                    Теория
                </h2>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 md:gap-8 xl:gap-12 w-full max-w-6xl">
                <div class="xl:col-span-5 space-y-5 md:space-y-6 order-2 xl:order-1">
                    <div id="theory-container" class="luxury-card p-5 md:p-8 min-h-[220px] md:min-h-[250px] flex items-start" aria-live="polite"></div>

                    <div class="grid grid-cols-2 gap-4">
                        <button
                            id="prev-btn"
                            onclick="prevTheoryCard()"
                            class="p-4 md:p-6 bg-white rounded-2xl md:rounded-3xl shadow-sm font-black uppercase text-[10px] md:text-xs border-b-4 border-slate-100 active:translate-y-1 active:border-b-0 transition-all disabled:opacity-50 disabled:cursor-not-allowed min-h-[52px]"
                            type="button"
                            aria-label="Предыдущий урок"
                        >
                            Назад
                        </button>

                        <button
                            id="next-btn"
                            onclick="nextTheoryCard()"
                            class="p-4 md:p-6 bg-indigo-500 text-white rounded-2xl md:rounded-3xl shadow-md font-black uppercase text-[10px] md:text-xs border-b-4 border-indigo-700 active:translate-y-1 active:border-b-0 transition-all disabled:opacity-50 disabled:cursor-not-allowed min-h-[52px]"
                            type="button"
                            aria-label="Следующий урок или упражнения"
                        >
                            Вперед
                        </button>
                    </div>
                    <button
                        id="ask-ai-lesson-btn"
                        onclick="askAILesson()"
                        class="w-full p-4 md:p-5 bg-indigo-500 text-white rounded-2xl md:rounded-3xl shadow-md font-black uppercase text-[10px] md:text-xs border-b-4 border-indigo-700 active:translate-y-1 active:border-b-0 transition-all min-h-[52px]"
                        type="button"
                        aria-label="Спросить ИИ про этот урок"
                    >
                        Спросить ИИ 🤖
                    </button>
                </div>

                <div class="xl:col-span-7 flex justify-center order-1 xl:order-2">
                    <div id="chess-board" class="chess-grid" aria-label="Демонстрационная шахматная доска"></div>
                </div>
            </div>
        </section>

        <section id="exercise-section" class="hidden flex flex-col items-center">
            <div class="w-full max-w-6xl flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6 md:mb-8">
                <button onclick="backToTheory()" class="text-slate-400 font-black uppercase text-xs tracking-widest w-fit min-h-[48px]" aria-label="Назад к теории" type="button">
                    ← К теории
                </button>
                <h2 id="exercise-title" class="roblox-font italic uppercase text-slate-800 text-lg md:text-xl tracking-tighter">
                    Упражнения
                </h2>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 md:gap-8 xl:gap-12 w-full max-w-6xl">
                <div class="xl:col-span-5 space-y-5 md:space-y-6 order-2 xl:order-1">
                    <div class="luxury-card p-5 md:p-8 min-h-[300px] md:min-h-[320px]">
                        <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
                            <h3 class="text-slate-800 text-xl md:text-2xl font-black">Практика</h3>
                            <span id="exercise-counter" class="text-slate-400 text-xs md:text-sm font-black uppercase" aria-live="polite"></span>
                        </div>

                        <p id="exercise-description" class="text-slate-700 text-lg md:text-xl font-bold leading-relaxed mb-6">
                            Загрузка упражнения...
                        </p>

                        <div class="space-y-3">
                            <div class="bg-slate-50 rounded-2xl p-4">
                                <p class="text-slate-400 text-xs uppercase font-black mb-2">Выбранный ход</p>
                                <p id="move-preview" class="text-slate-700 font-black text-lg">—</p>
                            </div>

                            <div id="exercise-feedback" class="hidden rounded-2xl p-4 text-sm font-bold" aria-live="polite"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <button
                            id="reset-move-btn"
                            onclick="resetMoveSelection()"
                            class="p-4 md:p-5 bg-white rounded-2xl md:rounded-3xl shadow-sm font-black uppercase text-[10px] md:text-xs border-b-4 border-slate-100 active:translate-y-1 active:border-b-0 transition-all min-h-[52px]"
                            type="button"
                            aria-label="Сбросить выбранный ход"
                        >
                            Сбросить ход
                        </button>

                        <button
                            id="next-exercise-btn"
                            onclick="nextExercise()"
                            class="p-4 md:p-5 bg-indigo-500 text-white rounded-2xl md:rounded-3xl shadow-md font-black uppercase text-[10px] md:text-xs border-b-4 border-indigo-700 active:translate-y-1 active:border-b-0 transition-all disabled:opacity-50 disabled:cursor-not-allowed min-h-[52px]"
                            disabled
                            type="button"
                            aria-label="Следующее упражнение"
                        >
                            Следующее
                        </button>
                    </div>
                    <button
                        id="ask-ai-exercise-btn"
                        onclick="askAIExercise()"
                        class="w-full p-4 md:p-5 bg-indigo-500 text-white rounded-2xl md:rounded-3xl shadow-md font-black uppercase text-[10px] md:text-xs border-b-4 border-indigo-700 active:translate-y-1 active:border-b-0 transition-all min-h-[52px]"
                        type="button"
                        aria-label="Спросить ИИ про это упражнение"
                    >
                        Спросить ИИ 🤖
                    </button>

                    <button
                        id="complete-lesson-btn"
                        onclick="completeLesson()"
                        class="w-full p-4 md:p-5 bg-emerald-500 text-white rounded-2xl md:rounded-3xl shadow-md font-black uppercase text-[10px] md:text-xs border-b-4 border-emerald-700 active:translate-y-1 active:border-b-0 transition-all hidden min-h-[52px]"
                        type="button"
                        aria-label="Завершить урок"
                    >
                        Завершить урок
                    </button>
                </div>

                <div class="xl:col-span-7 flex justify-center order-1 xl:order-2">
                    <div class="space-y-5 flex flex-col items-center w-full">
                        <div id="exercise-board" class="chess-grid" aria-label="Интерактивная шахматная доска упражнения"></div>

                        <div class="bg-white rounded-2xl md:rounded-3xl px-5 md:px-6 py-4 shadow-sm border-b-4 border-slate-100 w-full max-w-[500px]">
                            <p class="text-slate-500 text-xs uppercase font-black mb-1">Как сделать ход</p>
                            <p class="text-slate-700 font-bold text-sm md:text-base">
                                Нажми сначала на фигуру, потом на клетку назначения.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="state.js"></script>
    <script src="api.js"></script>
    <script>
        if (!window.roChessApi || !window.roChessApi.isAuthenticated()) {
            window.location.href = 'index.html';
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        let currentLessonData = null;
        let currentTheoryIdx = 0;
        let activeSection = 'topics-section';

        let currentTopicLessons = [];
        let currentLessonIndex = -1;
        let currentTopicTitle = '';
        let currentTopicId = null;

        let lessonExercises = [];
        let currentExerciseIndex = 0;
        let currentExercise = null;
        let selectedFromSquare = null;
        let selectedToSquare = null;
        let lastMoveFrom = null;
        let lastMoveTo = null;
        let solvedExercises = new Set();
        let toastTimer = null;
        let isCheckingExerciseMove = false;

        const DEFAULT_FEN = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR";
        const pageMessage = document.getElementById('page-message');
        const liveRegion = document.getElementById('live-region');
        const toast = document.getElementById('toast');

        function announce(message) {
            if (liveRegion) liveRegion.textContent = message;
        }

        function showToast(message, type = 'default') {
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.className = 'toast show';

            if (type === 'error') {
                toast.style.background = 'rgba(127, 29, 29, 0.96)';
            } else if (type === 'success') {
                toast.style.background = 'rgba(6, 78, 59, 0.96)';
            } else {
                toast.style.background = 'rgba(15, 23, 42, 0.94)';
            }

            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2400);
        }

        function showPageMessage(message, type = 'info') {
            pageMessage.className = `mb-5 inline-message ${type}`;
            pageMessage.textContent = message;
            pageMessage.classList.remove('hidden');
            announce(message);
        }

        function hidePageMessage() {
            pageMessage.classList.add('hidden');
            pageMessage.textContent = '';
        }

        function renderEmptyState(title, text, actionHtml = '') {
            return `
                <div class="empty-state">
                    <div class="text-4xl mb-3">📚</div>
                    <div class="text-slate-700 text-lg font-black mb-2">${title}</div>
                    <div class="text-slate-500 font-bold mb-4">${text}</div>
                    ${actionHtml}
                </div>
            `;
        }

        function renderErrorState(message, retryCode = '') {
            return `
                <div class="error-state">
                    <div class="text-4xl mb-3">😵</div>
                    <div class="text-lg font-black text-red-700 mb-2">Ой, что-то пошло не так!</div>
                    <div class="text-red-600 font-bold mb-5">${message}</div>
                    ${retryCode ? `
                        <button
                            type="button"
                            onclick="${retryCode}"
                            class="px-6 py-3 min-h-[48px] bg-red-500 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-[0_8px_0_#dc2626] active:translate-y-[4px]"
                            aria-label="Попробовать снова"
                        >
                            Попробовать снова
                        </button>
                    ` : ''}
                </div>
            `;
        }

        function renderTopicsSkeleton() {
            const grid = document.getElementById('topics-grid');
            grid.innerHTML = Array.from({ length: 6 }).map(() => `
                <div class="topic-card p-6 md:p-8 flex flex-col items-center text-center">
                    <div class="w-16 h-16 rounded-3xl skeleton mb-4"></div>
                    <div class="h-5 w-32 rounded-xl skeleton mb-3"></div>
                    <div class="h-4 w-20 rounded-xl skeleton"></div>
                </div>
            `).join('');
        }

        function renderLessonsSkeleton() {
            const grid = document.getElementById('lessons-grid');
            grid.innerHTML = Array.from({ length: 4 }).map(() => `
                <div class="bg-white p-5 md:p-6 rounded-2xl md:rounded-3xl border-b-4 border-slate-100 flex justify-between items-center lesson-row">
                    <div class="h-5 w-40 rounded-xl skeleton"></div>
                    <div class="h-5 w-5 rounded-xl skeleton"></div>
                </div>
            `).join('');
        }

        function renderTheorySkeleton() {
            document.getElementById('theory-container').innerHTML = `
                <div class="w-full space-y-4">
                    <div class="h-6 w-3/4 rounded-xl skeleton"></div>
                    <div class="h-6 w-full rounded-xl skeleton"></div>
                    <div class="h-6 w-5/6 rounded-xl skeleton"></div>
                    <div class="h-6 w-2/3 rounded-xl skeleton"></div>
                </div>
            `;
            renderStaticBoard(DEFAULT_FEN, 'chess-board');
        }

        function renderExerciseSkeleton() {
            document.getElementById('exercise-counter').textContent = '';
            document.getElementById('exercise-description').innerHTML = `
                <span class="block h-6 w-5/6 rounded-xl skeleton mb-3"></span>
                <span class="block h-6 w-3/4 rounded-xl skeleton"></span>
            `;
            document.getElementById('move-preview').textContent = '—';
            hideFeedback();
            renderInteractiveBoard(DEFAULT_FEN);
        }

        function goBack() {
            hidePageMessage();

            if (activeSection === 'exercise-section') {
                showSection('content-section');
            } else if (activeSection === 'content-section') {
                showSection('lessons-section');
            } else if (activeSection === 'lessons-section') {
                showSection('topics-section');
            } else {
                window.location.href = 'Dashboard.html';
            }
        }

        function backToTheory() {
            hidePageMessage();
            showSection('content-section');
        }

        async function loadTopics() {
            const grid = document.getElementById('topics-grid');
            renderTopicsSkeleton();
            hidePageMessage();
            announce('Загружаются темы');

            try {
                const data = await window.roChessApi.fetchWithAuth('lessons/topics');

            currentTopicTitle = title;
            currentLessonIndex = -1;
            currentTopicLessons = [];

            document.getElementById('current-topic-title').textContent = title;

            const grid = document.getElementById('lessons-grid');
            renderLessonsSkeleton();
            hidePageMessage();
            announce('Загружаются уроки');

                showPageMessage('Ой, что-то пошло не так! Не удалось загрузить уроки.', 'error');

        async function loadLessonContent(lessonId, lessonIndex = -1) {
            showSection('content-section');
            renderTheorySkeleton();
            hidePageMessage();
            announce('Загружается теория урока');

            try {
                const data = await window.roChessApi.fetchWithAuth(`lessons/${lessonId}`);
                const lesson = data.lesson || data;

                currentLessonData = {
                    id: lesson.id || lessonId,
                    title: lesson.title || lesson.name || "Урок",
                    content: lesson.content || "",
                    board_examples: Array.isArray(lesson.board_examples) ? lesson.board_examples : []
                };

                currentLessonIndex = lessonIndex;
                currentTheoryIdx = 0;

                updateTheoryUI();
                updateLessonNavigationButtons();
                announce('Теория урока загружена');
            } catch (err) {
                console.error("ОШИБКА ЗАГРУЗКИ КОНТЕНТА:", err);
                document.getElementById('theory-container').innerHTML = renderErrorState('Не удалось загрузить теорию урока.', `loadLessonContent(${lessonId}, ${lessonIndex})`);
                showPageMessage('Ой, что-то пошло не так! Не удалось загрузить теорию.', 'error');
            }
        }

        function updateTheoryUI() {
            if (!currentLessonData) return;

            const theoryContainer = document.getElementById('theory-container');
            const lessonTitle = document.getElementById('lesson-title');

            lessonTitle.textContent = currentLessonData.title || "Урок";

            const content = String(currentLessonData.content || "").trim();

            if (content) {
                theoryContainer.innerHTML = `
                    <div class="w-full h-full flex items-start fade-swap">
                        <p class="text-slate-700 text-xl md:text-2xl xl:text-3xl font-bold leading-relaxed">
                            ${content}
                        </p>
                    </div>
                `;
            } else {
                theoryContainer.innerHTML = renderEmptyState(
                    'Теория пока не готова',
                    'Текст урока ещё добавляется.'
                );
            }

            const boards = Array.isArray(currentLessonData.board_examples)
                ? currentLessonData.board_examples
                : [];

            const currentFen = boards[0]?.fen || DEFAULT_FEN;
            renderStaticBoard(currentFen, 'chess-board');
            updateLessonNavigationButtons();
        }

        function updateLessonNavigationButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            const hasLessons = Array.isArray(currentTopicLessons) && currentTopicLessons.length > 0;
            prevBtn.disabled = !hasLessons || currentLessonIndex <= 0;

            if (!hasLessons) {
                nextBtn.disabled = true;
                nextBtn.textContent = 'Вперед';
                return;
            }

            if (currentLessonIndex < currentTopicLessons.length - 1) {
                nextBtn.disabled = false;
                nextBtn.textContent = 'Вперед';
            } else {
                nextBtn.disabled = false;
                nextBtn.textContent = 'К упражнениям';
            }
        }

        function nextTheoryCard() {
            if (!Array.isArray(currentTopicLessons) || currentTopicLessons.length === 0) return;

            if (currentLessonIndex < currentTopicLessons.length - 1) {
                const nextLesson = currentTopicLessons[currentLessonIndex + 1];
                loadLessonContent(nextLesson.id, currentLessonIndex + 1);
            } else {
                openExercises();
            }
        }

        function prevTheoryCard() {
            if (!Array.isArray(currentTopicLessons) || currentTopicLessons.length === 0) return;

            if (currentLessonIndex > 0) {
                const prevLesson = currentTopicLessons[currentLessonIndex - 1];
                loadLessonContent(prevLesson.id, currentLessonIndex - 1);
            }
        }

        async function openExercises() {
            if (!currentLessonData?.id) return;

            showSection('exercise-section');
            renderExerciseSkeleton();

            document.getElementById('exercise-title').textContent = `${currentLessonData.title}: упражнения`;

            try {
                const data = await window.roChessApi.fetchWithAuth(`lessons/${currentLessonData.id}/exercises`);
                const exercises = data.exercises || data || [];

                lessonExercises = Array.isArray(exercises) ? exercises : [];
                currentExerciseIndex = 0;
                solvedExercises = new Set();

                if (!lessonExercises.length) {
                    document.getElementById('exercise-description').textContent = 'Для этого урока пока нет упражнений.';
                    document.getElementById('complete-lesson-btn').classList.remove('hidden');
                    document.getElementById('next-exercise-btn').classList.add('hidden');
                    renderInteractiveBoard(DEFAULT_FEN);
                    showPageMessage('Упражнений пока нет. Можно завершить урок.', 'info');
                    return;
                }

                document.getElementById('next-exercise-btn').classList.remove('hidden');
                document.getElementById('complete-lesson-btn').classList.add('hidden');

                loadExerciseByIndex(0);
                announce('Упражнения загружены');
            } catch (err) {
                console.error('Ошибка загрузки упражнений:', err);
                document.getElementById('exercise-description').textContent = 'Ошибка загрузки упражнений';
                document.getElementById('exercise-feedback').classList.add('hidden');
                renderInteractiveBoard(DEFAULT_FEN);
                showPageMessage('Ой, что-то пошло не так! Не удалось загрузить упражнения.', 'error');
            }
        }

        function loadExerciseByIndex(index) {
            if (!lessonExercises.length) return;
            if (index < 0 || index >= lessonExercises.length) return;

            currentExerciseIndex = index;
            currentExercise = lessonExercises[index];

            selectedFromSquare = null;
            selectedToSquare = null;
            lastMoveFrom = null;
            lastMoveTo = null;

            document.getElementById('exercise-counter').textContent = `${index + 1} / ${lessonExercises.length}`;
            document.getElementById('move-preview').textContent = '—';

            hideFeedback();

            const description =
                currentExercise.description ||
                currentExercise.prompt ||
                currentExercise.task ||
                'Сделай правильный ход на доске.';

            document.getElementById('exercise-description').textContent = description;

            const fen =
                currentExercise.fen ||
                currentExercise.position_fen ||
                currentExercise.board_fen ||
                DEFAULT_FEN;

            renderInteractiveBoard(fen);
            updateExerciseButtons();
        }

        function updateExerciseButtons() {
            const nextBtn = document.getElementById('next-exercise-btn');
            const completeBtn = document.getElementById('complete-lesson-btn');

            const isLast = currentExerciseIndex >= lessonExercises.length - 1;

            if (!lessonExercises.length) {
                nextBtn.disabled = true;
                nextBtn.classList.add('hidden');
                completeBtn.classList.remove('hidden');
                return;
            }

            if (isLast) {
                nextBtn.classList.add('hidden');
                completeBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                completeBtn.classList.add('hidden');
                nextBtn.disabled = !solvedExercises.has(currentExerciseIndex);
            }
        }

        function nextExercise() {
            if (currentExerciseIndex < lessonExercises.length - 1) {
                loadExerciseByIndex(currentExerciseIndex + 1);
            }
        }

        function resetMoveSelection() {
            selectedFromSquare = null;
            selectedToSquare = null;
            updateMovePreview();
            renderInteractiveBoard(getCurrentExerciseFen());
        }

        function hideFeedback() {
            const box = document.getElementById('exercise-feedback');
            box.className = 'hidden rounded-2xl p-4 text-sm font-bold';
            box.textContent = '';
        }

        function showFeedback(type, text) {
            const box = document.getElementById('exercise-feedback');
            box.classList.remove('hidden');

            if (type === 'success') {
                box.className = 'rounded-2xl p-4 text-sm font-bold bg-emerald-50 text-emerald-700 border border-emerald-200';
            } else if (type === 'warning') {
                box.className = 'rounded-2xl p-4 text-sm font-bold bg-amber-50 text-amber-700 border border-amber-200';
            } else {
                box.className = 'rounded-2xl p-4 text-sm font-bold bg-rose-50 text-rose-700 border border-rose-200';
            }

            box.textContent = text;
        }

        function indexToSquare(row, col) {
            const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
            const rank = 8 - row;
            return `${files[col]}${rank}`;
        }

        function getCurrentExerciseFen() {
            return (
                currentExercise?.fen ||
                currentExercise?.position_fen ||
                currentExercise?.board_fen ||
                DEFAULT_FEN
            );
        }

        function parseFenBoardMap(fen) {
            const boardPart = String(fen || DEFAULT_FEN).split(' ')[0];
            const rows = boardPart.split('/');
            const boardMap = {};

            rows.forEach((rowStr, rowIndex) => {
                let colIndex = 0;

                for (const char of rowStr) {
                    if (/\d/.test(char)) {
                        colIndex += parseInt(char, 10);
                    } else {
                        const square = indexToSquare(rowIndex, colIndex);
                        boardMap[square] = char;
                        colIndex += 1;
                    }
                }
            });

            return boardMap;
        }

        function getPieceAtSquare(square) {
            const boardMap = parseFenBoardMap(getCurrentExerciseFen());
            return boardMap[square] || null;
        }

        function onExerciseSquareClick(square) {
            if (!currentExercise || isCheckingExerciseMove) return;

            const clickedPiece = getPieceAtSquare(square);
            const fromPiece = selectedFromSquare ? getPieceAtSquare(selectedFromSquare) : null;

            // Первый клик: обязательно по фигуре
            if (!selectedFromSquare) {
                if (!clickedPiece) {
                    showToast('Сначала выбери фигуру', 'error');
                    return;
                }

                selectedFromSquare = square;
                selectedToSquare = null;
                updateMovePreview();
                renderInteractiveBoard(getCurrentExerciseFen());
                return;
            }

            // Клик по той же клетке = снять выбор
            if (square === selectedFromSquare) {
                selectedFromSquare = null;
                selectedToSquare = null;
                updateMovePreview();
                renderInteractiveBoard(getCurrentExerciseFen());
                return;
            }

            // Если нажали на фигуру ТОЙ ЖЕ стороны — просто меняем выбранную фигуру
            if (clickedPiece && fromPiece && isSameSide(clickedPiece, fromPiece)) {
                selectedFromSquare = square;
                selectedToSquare = null;
                updateMovePreview();
                renderInteractiveBoard(getCurrentExerciseFen());
                return;
            }

            // Иначе это попытка хода, в том числе взятия
            selectedToSquare = square;
            updateMovePreview();
            renderInteractiveBoard(getCurrentExerciseFen());

            setTimeout(() => {
                submitExerciseMove();
            }, 0);
        }

        function updateMovePreview() {
            const preview = document.getElementById('move-preview');

            if (selectedFromSquare && selectedToSquare) {
                preview.textContent = `${selectedFromSquare} → ${selectedToSquare}`;
            } else if (selectedFromSquare) {
                preview.textContent = `${selectedFromSquare} → ...`;
            } else {
                preview.textContent = '—';
            }
        }

        async function submitExerciseMove() {
            if (!currentExercise || !selectedFromSquare || !selectedToSquare || isCheckingExerciseMove) return;

            const fromSquare = selectedFromSquare;
            const toSquare = selectedToSquare;

            const sanMove = buildSanMove(fromSquare, toSquare, getCurrentExerciseFen());

            const payload = {
                from: fromSquare,
                to: toSquare,
                move: sanMove,
                uci: `${fromSquare}${toSquare}`
            };

            isCheckingExerciseMove = true;
            showFeedback('warning', 'Проверяем ход...');
            renderInteractiveBoard(getCurrentExerciseFen());

            try {
                const res = await window.roChessApi.fetchWithAuth(
                    `lessons/${currentLessonData.id}/exercises/${currentExercise.id}/check`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    }
                );

                const isCorrect =
                    res.correct === true ||
                    res.is_correct === true ||
                    res.result === 'correct' ||
                    res.status === 'correct';

                const nextFen =
                    res.fen ||
                    res.new_fen ||
                    currentExercise.fen ||
                    currentExercise.position_fen ||
                    currentExercise.board_fen ||
                    DEFAULT_FEN;

                currentExercise.fen = nextFen;
                lastMoveFrom = fromSquare;
                lastMoveTo = toSquare;

                if (isCorrect) {
                    const feedbackText =
                        res.message ||
                        res.feedback ||
                        res.explanation ||
                        'Правильно! ✅';

                    showFeedback('success', feedbackText);
                    showToast('Правильный ход', 'success');
                    solvedExercises.add(currentExerciseIndex);

                    selectedFromSquare = null;
                    selectedToSquare = null;
                    updateMovePreview();
                } else {
                    let text = 'Неправильно ❌';

                    if (res.hint) {
                        text = `Неправильно. Подсказка: ${res.hint}`;
                    }

                    if (res.correct_move) {
                        text += ` Правильный ход: ${res.correct_move}`;
                    }

                    if (res.explanation) {
                        text += ` ${res.explanation}`;
                    }

                    showFeedback('warning', text);
                    showToast('Попробуй ещё раз', 'error');

                    // НЕ сбрасываем from/to сразу —
                    // пусть пользователь видит, какой ход он пытался сделать
                    updateMovePreview();
                }

                renderInteractiveBoard(nextFen);
                updateExerciseButtons();

            } catch (err) {
                console.error('Ошибка проверки упражнения:', err);
                showFeedback('error', `Ошибка проверки хода: ${err.message} ❌`);
                showToast('Ой, что-то пошло не так!', 'error');
            } finally {
                isCheckingExerciseMove = false;
                renderInteractiveBoard(getCurrentExerciseFen());
            }
        }

        async function completeLesson() {
            if (!currentLessonData?.id) return;

            const btn = document.getElementById('complete-lesson-btn');
            const originalText = btn.textContent;

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> Завершаем`;

            try {
                await window.roChessApi.fetchWithAuth(`lessons/${currentLessonData.id}/complete`, {
                    method: 'POST'
                });

                showToast('Урок завершён!', 'success');
                showPageMessage('Отлично! Урок успешно завершён.', 'success');

                if (currentTopicId && currentTopicTitle) {
                    await loadLessons(currentTopicId, currentTopicTitle);
                    showSection('lessons-section');
                } else {
                    window.location.href = 'Dashboard.html';
                }
            } catch (err) {
                console.error('Ошибка завершения урока:', err);
                showToast('Не удалось завершить урок', 'error');
                showPageMessage('Ой, что-то пошло не так! Не удалось завершить урок.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        function renderStaticBoard(fen, containerId) {
            const board = document.getElementById(containerId);
            if (!board) return;

            const pieces = {
                'P': '♙', 'N': '♘', 'B': '♗', 'R': '♖', 'Q': '♕', 'K': '♔',
                'p': '♟', 'n': '♞', 'b': '♝', 'r': '♜', 'q': '♛', 'k': '♚'
            };

            const boardPart = String(fen || DEFAULT_FEN).split(' ')[0];
            const rows = boardPart.split('/');
            board.innerHTML = '';

            rows.forEach((row, rIdx) => {
                let cIdx = 0;

                for (const char of row) {
                    if (/\d/.test(char)) {
                        for (let i = 0; i < parseInt(char, 10); i++) {
                            const sq = document.createElement('div');
                            sq.className = `board-square ${(rIdx + cIdx) % 2 === 0 ? 'sq-l' : 'sq-d'}`;
                            board.appendChild(sq);
                            cIdx++;
                        }
                    } else {
                        const sq = document.createElement('div');
                        sq.className = `board-square ${(rIdx + cIdx) % 2 === 0 ? 'sq-l' : 'sq-d'} flex items-center justify-center`;
                        sq.innerHTML = `<span class="piece">${pieces[char] || ''}</span>`;
                        board.appendChild(sq);
                        cIdx++;
                    }
                }
            });
        }

        function renderInteractiveBoard(fen) {
            const board = document.getElementById('exercise-board');
            if (!board) return;

            const pieces = {
                'P': '♙', 'N': '♘', 'B': '♗', 'R': '♖', 'Q': '♕', 'K': '♔',
                'p': '♟', 'n': '♞', 'b': '♝', 'r': '♜', 'q': '♛', 'k': '♚'
            };

            const boardPart = String(fen || DEFAULT_FEN).split(' ')[0];
            const rows = boardPart.split('/');
            board.innerHTML = '';

            rows.forEach((row, rIdx) => {
                let cIdx = 0;

                for (const char of row) {
                    if (/\d/.test(char)) {
                        for (let i = 0; i < parseInt(char, 10); i++) {
                            const squareName = indexToSquare(rIdx, cIdx);
                            const sq = document.createElement('button');
                            sq.type = 'button';
                            sq.className = `board-square ${(rIdx + cIdx) % 2 === 0 ? 'sq-l' : 'sq-d'} focus-ring`;
                            sq.setAttribute('aria-label', `Клетка ${squareName}`);

                            if (selectedFromSquare === squareName) sq.classList.add('selected-square');
                            if (selectedToSquare === squareName) sq.classList.add('target-square');
                            if (lastMoveFrom === squareName) sq.classList.add('last-move-from');
                            if (lastMoveTo === squareName) sq.classList.add('last-move-to');

                            if (!isCheckingExerciseMove) {
                                sq.onclick = () => onExerciseSquareClick(squareName);
                            } else {
                                sq.disabled = true;
                            }

                            board.appendChild(sq);
                            cIdx++;
                        }
                    } else {
                        const squareName = indexToSquare(rIdx, cIdx);
                        const sq = document.createElement('button');
                        sq.type = 'button';
                        sq.className = `board-square ${(rIdx + cIdx) % 2 === 0 ? 'sq-l' : 'sq-d'} flex items-center justify-center focus-ring`;
                        sq.setAttribute('aria-label', `Клетка ${squareName}`);

                        if (selectedFromSquare === squareName) sq.classList.add('selected-square');
                        if (selectedToSquare === squareName) sq.classList.add('target-square');
                        if (lastMoveFrom === squareName) sq.classList.add('last-move-from');
                        if (lastMoveTo === squareName) sq.classList.add('last-move-to');

                        if (!isCheckingExerciseMove) {
                            sq.onclick = () => onExerciseSquareClick(squareName);
                        } else {
                            sq.disabled = true;
                        }

                        sq.innerHTML = `<span class="piece">${pieces[char] || ''}</span>`;
                        board.appendChild(sq);
                        cIdx++;
                    }
                }
            });
        }

                }
            });
        }

        if (mobileOverlay) {
            mobileOverlay.addEventListener('click', closeMobileMenu);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMobileMenu();
            }
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1280) {
                mobileOverlay?.classList.add('hidden');
                sidebar?.classList.remove('-translate-x-full');
            } else {
                sidebar?.classList.add('-translate-x-full');
            }
        });

        function isWhitePiece(piece) {
            return !!piece && piece === piece.toUpperCase();
        }

        function isBlackPiece(piece) {
            return !!piece && piece === piece.toLowerCase();
        }

        function isSameSide(pieceA, pieceB) {
            if (!pieceA || !pieceB) return false;
            return (isWhitePiece(pieceA) && isWhitePiece(pieceB)) ||
                (isBlackPiece(pieceA) && isBlackPiece(pieceB));
        }

        function buildSanMove(from, to, fen) {
            try {
                const game = new Chess(fen);
                const moveObj = game.move({ from, to, promotion: 'q' });
                return moveObj ? moveObj.san : `${from}${to}`;
            } catch (e) {
                console.error('Ошибка преобразования хода в SAN:', e);
                return `${from}${to}`;
            }
        }

        function askAILesson() {
            const lessonTitle = currentLessonData?.title || 'Урок';
            const lessonContent = String(currentLessonData?.content || '').trim();
            const topicTitle = currentTopicTitle || 'Тема';

            const prompt = [
                `Я изучаю урок "${lessonTitle}" по теме "${topicTitle}".`,
                lessonContent ? `Вот текст урока:\n${lessonContent}` : '',
                'Объясни этот урок простыми словами.',
                'Выдели главное, что нужно запомнить.',
                'Скажи, какие типичные ошибки бывают по этой теме.',
                'И дай 3 коротких совета, как лучше усвоить этот материал.'
            ].filter(Boolean).join('\n\n');

            localStorage.setItem('chat_prefill', prompt);
            localStorage.setItem('chat_context', JSON.stringify({
                type: 'lesson',
                topic_title: topicTitle,
                lesson_id: currentLessonData?.id || null,
                lesson_title: lessonTitle
            }));

            window.location.href = 'chat.html';
        }

        function askAIExercise() {
            const lessonTitle = currentLessonData?.title || 'Урок';
            const topicTitle = currentTopicTitle || 'Тема';
            const exerciseText =
                currentExercise?.description ||
                currentExercise?.prompt ||
                currentExercise?.task ||
                'Шахматное упражнение';

            const fen =
                currentExercise?.fen ||
                currentExercise?.position_fen ||
                currentExercise?.board_fen ||
                '';

            const selectedMove = document.getElementById('move-preview')?.textContent?.trim() || '—';
            const feedbackText = document.getElementById('exercise-feedback')?.textContent?.trim() || '';

            const prompt = [
                `Я решаю упражнение в уроке "${lessonTitle}" по теме "${topicTitle}".`,
                `Описание упражнения: ${exerciseText}`,
                fen ? `Позиция FEN: ${fen}` : '',
                `Мой выбранный ход: ${selectedMove}`,
                feedbackText ? `Подсказка/фидбек от системы: ${feedbackText}` : '',
                'Помоги решить это упражнение, но не просто давай ответ сразу.',
                'Сначала объясни, на что смотреть в позиции.',
                'Потом мягко подведи к правильной идее.',
                'Если нужно, в конце скажи правильный ход.'
            ].filter(Boolean).join('\n\n');

            localStorage.setItem('chat_prefill', prompt);
            localStorage.setItem('chat_context', JSON.stringify({
                type: 'exercise',
                topic_title: topicTitle,
                lesson_id: currentLessonData?.id || null,
                lesson_title: lessonTitle,
                exercise_id: currentExercise?.id || null,
                fen: fen || null
            }));

            window.location.href = 'chat.html';
        }

        loadTopics();
</script>
