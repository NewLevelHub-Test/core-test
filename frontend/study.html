<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Chess - Desktop Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); 
            min-height: 100vh;
        }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        
        .desktop-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 2px solid white;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        .chess-grid { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 550px;
            aspect-ratio: 1 / 1;
            border: 12px solid #393b3d; 
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1), 0 15px 0 #d1d5db;
        }
        .sq-l { background-color: #ffffff; }
        .sq-d { background-color: #3b82f6; }
        
        .piece { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 4rem;
            filter: drop-shadow(0 6px 4px rgba(0,0,0,0.15));
        }

        .luxury-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .option-btn {
            background: white;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 6px solid #f1f5f9;
        }
        .option-btn:hover {
            transform: scale(1.03);
            border-color: #3b82f6;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.1);
        }
        .option-btn:active { transform: translateY(4px); border-bottom-width: 2px; }

        .check-btn {
            background: linear-gradient(180deg, #00cd81 0%, #00b06f 100%);
            box-shadow: 0 10px 0 #008a57, 0 20px 40px rgba(0, 176, 111, 0.2);
            transition: all 0.1s;
        }
        .check-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 #008a57; }
    </style>
</head>
<body class="flex">

    <aside class="w-72 desktop-sidebar h-screen sticky top-0 flex flex-col p-8 z-50">
        <div class="mb-12 text-center">
            <div class="bg-[#00b06f] text-white roblox-font italic uppercase text-2xl px-4 py-2 rounded-xl shadow-lg border-t-2 border-white/30 inline-block transform -rotate-2">
                RO-CHESS
            </div>
        </div>

        <nav class="space-y-4 flex-1">
            <a href="Dashboard.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">🏠</span> Дом
            </a>
            <a href="profile.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">👤</span> Профиль
            </a>
            <a href="test.html" class="flex items-center gap-4 p-4 bg-orange-50 rounded-2xl text-orange-600 font-black uppercase text-xs tracking-widest border-b-4 border-orange-100">
                <span class="text-2xl">📝</span> Тест
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-12 flex flex-col items-center">
        
        <div class="w-full max-w-4xl flex justify-between items-center mb-10 px-6">
            <div class="flex items-center gap-4">
                <a href="Dashboard.html" class="text-slate-400 font-black hover:text-slate-600 transition-colors uppercase text-xs tracking-widest">⬅ Вернуться</a>
                <h1 class="roblox-font italic uppercase text-slate-800 text-2xl tracking-tighter">Испытание Ладьи 🧩</h1>
            </div>
            <div class="w-64 bg-slate-100 h-4 rounded-full p-1 border border-white shadow-inner">
                <div class="bg-yellow-400 h-full rounded-full shadow-[0_0_10px_#facc15]" style="width: 60%"></div>
            </div>
        </div>

        <div class="w-full max-w-6xl grid grid-cols-12 gap-12 items-start">
            
            <div class="col-span-4 space-y-6">
                <div class="luxury-card p-8">
                    <span class="text-indigo-500 font-black text-[10px] uppercase tracking-[0.3em] mb-2 block">Вопрос 4/10</span>
                    <p class="font-black text-slate-700 text-2xl uppercase leading-tight roblox-font italic">Куда может пойти белая ладья? 👇</p>
                </div>

                <div class="space-y-4">
                    <button class="option-btn w-full p-6 rounded-[2rem] flex items-center justify-between border-2 border-transparent">
                        <span class="font-black text-slate-600 uppercase text-sm tracking-wide">Только вперед и назад</span>
                        <span class="text-3xl">🛡️</span>
                    </button>
                    <button class="option-btn w-full p-6 rounded-[2rem] flex items-center justify-between border-2 border-transparent">
                        <span class="font-black text-slate-600 uppercase text-sm tracking-wide">По прямой во все стороны</span>
                        <span class="text-3xl">🚀</span>
                    </button>
                </div>

                <button class="check-btn w-full text-white roblox-font italic uppercase py-6 rounded-[2.5rem] text-3xl tracking-widest mt-4">
                    Проверить!
                </button>
            </div>

            <div class="col-span-8 flex justify-center">
                <div class="chess-grid">
                    <script>
                        const grid = document.querySelector('.chess-grid');
                        for (let i = 0; i < 64; i++) {
                            const row = Math.floor(i / 8);
                            const col = i % 8;
                            const sq = document.createElement('div');
                            sq.className = (row + col) % 2 === 0 ? 'sq-l' : 'sq-d';
                            if (i === 18) {
                                sq.innerHTML = '<span class="piece">♖</span>';
                                sq.classList.add('bg-yellow-50');
                            }
                            grid.appendChild(sq);
                        }
                    </script>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
