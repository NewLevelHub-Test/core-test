<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Chess - Desktop Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); 
            min-height: 100vh;
        }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        
        .desktop-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 2px solid white;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        .board-wrapper {
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 12px solid #393b3d;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(59, 130, 246, 0.15), 0 15px 0 #d1d5db;
            background: white;
        }

        .sq { display: flex; justify-content: center; align-items: center; font-size: 3.5rem; transition: transform 0.2s; }
        .sq-w { background-color: #ffffff; }
        .sq-b { background-color: #3b82f6; }
        .sq:hover { transform: scale(1.05); z-index: 10; cursor: pointer; }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid white;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .answer-card {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 6px solid #f1f5f9;
        }
        .answer-card:hover { transform: scale(1.03); border-color: #3b82f6; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.1); }
        .answer-card:active { transform: translateY(4px); border-bottom-width: 2px; }
        
        .check-btn {
            background: linear-gradient(180deg, #00cd81 0%, #00b06f 100%);
            box-shadow: 0 10px 0 #008a57, 0 20px 40px rgba(0, 176, 111, 0.2);
        }
        .check-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 #008a57; }
    </style>
</head>
<body class="flex">

    <aside class="w-72 desktop-sidebar h-screen sticky top-0 flex flex-col p-8 z-50">
        <div class="mb-12 text-center">
            <div class="bg-[#00b06f] text-white roblox-font italic uppercase text-2xl px-4 py-2 rounded-xl shadow-lg border-t-2 border-white/30 inline-block transform -rotate-2">
                RO-CHESS
            </div>
        </div>
        <nav class="space-y-4 flex-1">
            <a href="Dashboard.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">🏠</span> Дом
            </a>
            <a href="profile.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl text-slate-400 font-black uppercase text-xs tracking-widest transition-all">
                <span class="text-2xl">👤</span> Профиль
            </a>
            <a href="test.html" class="flex items-center gap-4 p-4 bg-orange-50 rounded-2xl text-orange-600 font-black uppercase text-xs tracking-widest border-b-4 border-orange-100">
                <span class="text-2xl">📝</span> Тест
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-12 max-w-[1400px] mx-auto">
        
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-6">
                <a href="Dashboard.html" class="bg-white p-3 rounded-2xl shadow-md border-b-4 border-slate-100 active:translate-y-1 transition-all">🏠</a>
                <h1 class="roblox-font italic uppercase text-slate-800 text-3xl tracking-tighter">Испытание Мастера 🧩</h1>
            </div>
            <div class="w-80 flex items-center gap-4">
                <span class="text-[10px] font-black text-slate-400 uppercase whitespace-nowrap">Прогресс 1/3</span>
                <div class="w-full h-4 bg-slate-100 rounded-full border border-white shadow-inner overflow-hidden">
                    <div class="bg-emerald-400 h-full shadow-[0_0_10px_#10b981]" style="width: 33%"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-12 items-start">
            
            <div class="col-span-5 space-y-8">
                <section class="glass-card p-8 border-b-8 border-slate-100">
                    <h2 class="text-indigo-500 font-black text-xs uppercase mb-3 tracking-[0.2em]">Миссия: Шах и Мат</h2>
                    <p class="text-slate-800 font-black text-2xl leading-tight roblox-font italic uppercase italic">Найди лучший ход, чтобы поставить Шах! ⚡</p>
                </section>

                <div class="grid grid-cols-1 gap-4">
                    <button class="answer-card bg-white p-6 rounded-[2rem] flex items-center justify-between group">
                        <div class="flex items-center gap-6">
                            <span class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center font-black text-slate-400 group-hover:bg-blue-500 group-hover:text-white transition-all shadow-inner text-xl">A</span>
                            <span class="font-black text-slate-600 uppercase text-sm tracking-widest">Слон на C4</span>
                        </div>
                        <span class="opacity-0 group-hover:opacity-100 text-blue-500 transition-opacity text-2xl">🎯</span>
                    </button>

                    <button class="answer-card bg-white p-6 rounded-[2rem] flex items-center justify-between group">
                        <div class="flex items-center gap-6">
                            <span class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center font-black text-slate-400 group-hover:bg-blue-500 group-hover:text-white transition-all shadow-inner text-xl">B</span>
                            <span class="font-black text-slate-600 uppercase text-sm tracking-widest">Слон на F7</span>
                        </div>
                        <span class="opacity-0 group-hover:opacity-100 text-blue-500 transition-opacity text-2xl">🎯</span>
                    </button>
                </div>

                <button class="check-btn w-full text-white font-black py-8 rounded-[2.5rem] uppercase italic roblox-font tracking-widest text-3xl transition-all">
                    Проверить ответ! 🔍
                </button>
            </div>

            <div class="col-span-7 flex justify-center">
                <div class="board-wrapper">
                    <script>
                        const wrapper = document.querySelector('.board-wrapper');
                        for (let i = 0; i < 64; i++) {
                            const row = Math.floor(i / 8);
                            const col = i % 8;
                            const div = document.createElement('div');
                            div.className = `sq ${ (row + col) % 2 === 0 ? 'sq-w' : 'sq-b' }`;
                            if (i === 18) div.innerHTML = "♗"; 
                            if (i === 45) div.innerHTML = "♚"; 
                            wrapper.appendChild(div);
                        }
                    </script>
                </div>
            </div>

        </div>
    </main>
    <script src="state.js"></script>
    <script src="api.js"></script>
    <script>
        if (!window.roChessApi.isAuthenticated()) {
            window.location.href = 'h1.html';
        }
    </script>
</body>
</html>
