<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Chess - Desktop Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(circle at 20% 30%, #ffffff 0%, #e2e8f0 100%); 
            min-height: 100vh;
            overflow: hidden;
        }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        
        .desktop-card-lux { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px);
            border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 40px 100px rgba(0,0,0,0.07), 0 15px 0 #d1d5db;
        }

        .btn-green-lux { 
            background: linear-gradient(180deg, #00cd81 0%, #00b06f 100%);
            box-shadow: 0 10px 0 #008a57, 0 20px 40px rgba(0, 176, 111, 0.25); 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .btn-green-lux:hover { transform: scale(1.03) translateY(-2px); }
        .btn-green-lux:active { transform: translateY(8px); box-shadow: 0 2px 0 #008a57; }

        .floating-shape {
            position: absolute;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.4;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }
    </style>
</head>
<body class="flex items-center justify-center relative">

    <div class="floating-shape w-96 h-96 bg-blue-300 -top-20 -left-20"></div>
    <div class="floating-shape w-80 h-80 bg-emerald-300 -bottom-20 -right-20" style="animation-delay: -5s;"></div>

    <div class="w-full max-w-[500px] desktop-card-lux p-12 relative">
        
        <div class="text-center mb-14">
            <div class="inline-block bg-[#00b06f] text-white roblox-font italic uppercase text-5xl px-8 py-3 rounded-[2rem] transform -rotate-2 shadow-2xl mb-6 border-t-2 border-white/40">
                RO-CHESS
            </div>
            <p class="text-slate-400 font-black uppercase text-xs tracking-[0.4em] ml-2">Premium Desktop Portal</p>
        </div>

        <form class="space-y-8">
            <div class="space-y-2">
                <label class="text-slate-400 text-xs font-black uppercase tracking-widest ml-4">Логин / Email</label>
                <div class="relative group">
                    <input type="text" placeholder="Введите ваш ник..." 
                        class="w-full bg-slate-50/50 border-2 border-transparent rounded-[1.5rem] p-6 text-slate-700 font-bold placeholder-slate-300 outline-none focus:border-[#00b06f] focus:bg-white transition-all shadow-inner text-lg">
                    <span class="absolute right-6 top-6 opacity-20 text-3xl group-focus-within:opacity-100 transition-opacity">👤</span>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-slate-400 text-xs font-black uppercase tracking-widest ml-4">Пароль</label>
                <div class="relative group">
                    <input type="password" placeholder="••••••••" 
                        class="w-full bg-slate-50/50 border-2 border-transparent rounded-[1.5rem] p-6 text-slate-700 font-bold placeholder-slate-300 outline-none focus:border-[#00b06f] focus:bg-white transition-all shadow-inner text-lg">
                    <span class="absolute right-6 top-6 opacity-20 text-3xl group-focus-within:opacity-100 transition-opacity">🔑</span>
                </div>
            </div>

            <a href="Dashboard.html" class="btn-green-lux block w-full text-white font-black py-6 rounded-[2.5rem] text-center uppercase italic roblox-font tracking-[0.2em] text-3xl">
                Играть! ➔
            </a>

            <div class="flex items-center gap-8 py-2">
                <div class="h-[2px] bg-slate-100 flex-1 shadow-sm"></div>
                <span class="text-slate-300 font-black text-xs tracking-tighter">ЕЩЕ НЕТ АККАУНТА?</span>
                <div class="h-[2px] bg-slate-100 flex-1 shadow-sm"></div>
            </div>

            <a href="admin.html" class="block w-full text-slate-400 hover:text-indigo-500 font-black py-2 text-center uppercase italic roblox-font tracking-widest text-sm transition-colors">
                Создать новый профиль
            </a>
        </form>

        <div class="mt-12 p-5 bg-white rounded-[2rem] border-2 border-slate-50 flex items-center gap-5 shadow-sm">
            <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-2xl">🛡️</div>
            <div class="flex-1">
                <p class="text-blue-500 text-[10px] font-black uppercase leading-tight tracking-widest">Безопасность</p>
                <p class="text-slate-400 text-[9px] font-bold mt-1 leading-tight">Ваши данные защищены по стандартам Roblox Security.</p>
            </div>
        </div>
    </div>
    <script src="api.js"></script>
<script>
    const loginBtn = document.querySelector('.btn-green-lux');
    
    loginBtn.addEventListener('click', async (e) => {
        e.preventDefault(); 

        const username = document.querySelector('input[type="text"]').value;
        const password = document.querySelector('input[type="password"]').value;

        if (username === "admin" && password === "1234") {
            localStorage.setItem('jwt_token', 'test_token_12345');
            alert('Вход выполнен успешно! (Режим эмуляции)');
            window.location.href = 'Dashboard.html';
        } else {
            alert('Неверный логин или пароль! (Попробуй admin / 1234)');
        }
    });
</script>
</body>
</html>
