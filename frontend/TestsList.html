<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Выбор испытания - Ro-Chess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f8fafc; }
        .roblox-font { font-family: 'Montserrat', sans-serif; }
        .luxury-card { 
            background: white; border-radius: 32px; border: 2px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 8px 0 #e2e8f0;
            transition: all 0.2s ease;
        }
        .luxury-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-12">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="roblox-font italic uppercase text-4xl mb-12 text-slate-800">Выбери Испытание 🧩</h1>
        <div id="tests-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </div>

    <script src="state.js"></script>
    <script src="api.js"></script>
    <script>
        async function loadAllTests() {
            const container = document.getElementById('tests-grid');
            try {
                console.log("Запрашиваю список тестов...");
                const data = await window.roChessApi.getTestsList();
                
                console.log("Данные от сервера:", data);

                const tests = data.tests || []; 

                if (tests.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full p-10 bg-white rounded-3xl border-2 border-dashed border-slate-200 text-slate-400">
                            <p class="text-xl">📭 Тесты пока не созданы в базе данных</p>
                        </div>`;
                    return;
                }

                container.innerHTML = ''; 
                
                tests.forEach(test => {
                    const card = document.createElement('div');
                    card.className = 'luxury-card p-8 flex flex-col items-center';
                    card.innerHTML = `
                        <div class="text-5xl mb-4">🏆</div>
                        <h2 class="roblox-font italic uppercase text-xl mb-2 text-slate-800">${test.title}</h2>
                        <p class="text-slate-400 text-[10px] font-black mb-6 uppercase tracking-widest">${test.description || 'Проверка знаний'}</p>
                        <a href="test.html?id=${test.id}" class="w-full bg-indigo-500 text-white font-black py-4 rounded-2xl uppercase italic roblox-font tracking-widest text-center shadow-[0_6px_0_#4338ca] active:translate-y-1 active:shadow-none transition-all">Играть ➔</a>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Критическая ошибка:", err);
                container.innerHTML = `<p class="text-rose-500 font-bold">Ошибка соединения: ${err.message}</p>`;
            }
        }
        loadAllTests();
    </script>
</body>
</html>
